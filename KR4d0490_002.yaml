body:
  text: 勤齋集卷二元蕭㪺撰說無欲齋說行中書省平章公有燕休講肄之所問名於僕書以無欲因俾申其義曰惟天生民理與氣具理也為仁義禮智之性氣也為五臟百骸之形人生而静性之本也至大至剛氣之本也人與天地本一私欲間之則二惟静無欲惟剛無所屈撓昔夫子歎未見剛者以申棖有欲不得為剛剛與欲正相反剛則不屈於欲故常伸於萬物之上有欲則已小物大為物所掩而屈焉孟子曰養心莫善於寡欲周子又謂寡焉以至於無聖學以一為要一者無欲也無欲則静虛動直而明通公溥又曰無欲故静至哉言乎方其事物未接思慮不萌湛然純一五性渾然在中塗人堯舜天地同流雖鬼神莫知焉既感而四端出五典惇充之可以保四海此性情之正子思謂之大本達道無欲之事也發於形氣溺於意向雖小大汙潔不齊凡足以䘮志荒政之屬皆奮吾剛斷克治之以復本初寡欲之方也然必先用力於格物致知之功乃能别心意之是非邪正躐等陵節又不可也或曰如槁木死灰無欲矣乎曰不然此二氏絶滅倫類而終不能者夫飲食男女天理存焉天理人欲同行異情明者即此為治心修身造端切要昧則流為大欲耳若帝舜之從欲以治夫子所欲不踰矩欲仁斯至孟子可欲之善皆聖賢政教公天下萬世淑斯人者烏可與形氣之私同言而付之枯槁乎要在日用間精察力行耳然有不可不知者剛有二焉有血氣之剛有義理之剛血氣之剛能施於朝夕或輟於持乆有見於少壯或衰於暮年理義之剛本乎浩然之氣從道不從物為善不為利富貴不能淫貧賤不能移威武不能屈此毘陵周氏說朱子謂緊切可取者然其要歸於由夫大學之道而己噫民之多欲也甚矣奪攘矯䖍猶未屬厭以死殉焉非秉鈞當國之君子同寅和衷率而拯之流禍何極乎苟子不欲雖賞不竊上之化下風行草偃豈不信哉公開府未朞月頌聲洋溢大書屢書有其人此姑言名扁之意公之名譯言為鑌友朋字之曰徳剛故為說如此云延祐丁巳重九日病叟蕭某書馮鳯儀字說咸寧馮鶚飛介友生陳㽦耕道來言翼雲中書都司鵬飛吾弟也由陜西憲史當移江陵念二親年在喜懼我兄弟恒睽離膝下烏鳥之情有不能自已者每竊自傷不忍復以飛揚為稱又鶚非鵬之族類且専以擊搏害物為事有乖慈祥孺慕之意願易之余聞凡天下之事物皆可以為名與字苐存善去惡而已傳稱不以國官畜牲隠疾之屬考諸昔人皆有用者顧所行何如耳無已有一焉凡尊名之義必相符則羽族之良莫鳯若者書曰簫韶九成鳯凰來儀言其感至徳之和而來有容儀也若曰鳯儀則知羣疑皆亡且有以進於善可感至治之應而瑞世矣曰諾請用之申告之曰揚子雲譔法言凖論語出處則曰鳯鳯何其微反貽詰鳯之譏至朱子以春秋之法深貶之此又不可不知也然則如之何曰勉為大學之道而已春日載陽慎路自愛延祐乙卯三月甲戌鴻濛穴主人書銘欽齋銘於皇上帝斡流二五民有彛兮火神司禮其端維敬萬變尸兮欽肅寅畏嚴恭祗翼同一歸兮姚姒以降竹素森列有餘師兮立本既固格致乃光毋偏隳兮之子名齋澡雪陳翳尤所宜兮為儒有二為人為己生死岐兮詭言詭行反道敗徳絶勿闚兮狃于多中無變彀率羿則欷兮敏齋銘改過雷烈遷善風行勉勉終身無求速成日就月將瞬息有思乾乾之功曷敏如是直養齋銘萬物所資均乎一氣孰其尸之曰維上帝帝命人極健順五常氣則偕行莫禦莫量順理為直得養則大襲正助忘匪理斯害凡中有主所向無前拔山蓋世古亦有焉敬義夾持俯仰無愧上下同流勇何足議不憂不懼不疑所行何物事功撼吾靈扄矯矯裴君炎黄其學從事于斯受說先覺繄余小子願學未能敢銘君齋實惟自銘贊質齋贊國子助教祁君子京以質名齋自為記且銘之一時宗工秀人題咏盡其義矣齊人蕭㪺掇其遺而為贊曰上古聖人仰觀俯察旁及鳥獸取象惟八書契干戈登降椌楬化成之具于焉以茁巍乎煥乎重華位陟文命誕敷懋昭大徳視民如傷於湯有光姬情孔思謨訓洋洋經緯三極時維至文世變風移覆其質云世之謂文古所無有㳺夏言行昭昭可考絺章繪句錦心繡口充棟汗牛世用曷取蔽天之明窒人之靈繇政迄廣禍斯以成卓哉祁君矜世之病質以自居求盡其性如彼泉流載浚其源彼華彼實載植厥根如賁尚白循循勿勿立徳立言成已成物狀辭免國子司業狀近於正月初四日承中書省官馮宣使傳奉都堂鈞㫖給到馳驛聖㫖令㪺赴都事扶疾聴命戰兢無措竊念㪺愚鄙寡陋疑昧積塞與人共學非敢為師度分量能苟安田里不期逺近稱譽名過於實致誤朝聴妄被聖恩授以陜西儒學提舉自顧荒謬何敢叨冒寵榮以取盗虛聲之罪超越資序有紊朝經謹以懇辭幸蒙聴允忽辱嚴召實倍兢惕繼令鈞命諭以國學事務愈益惶懼無地自容聲聞過情君子所恥學未成已何以及人猶不能當外郡學職豈復敢預國學之事灼見力小任重以速顛覆之禍又為辭卑居尊以取無亷恥貪冒之罪其心忘目昏卧疾日乆猶在所不論伏望俯察愚誠收回成命旁求天下以授真儒則聖道宏暢人望允協伏惟朝廷清明賢俊在位凡在海㝢孰不願奔走從事仰報萬一㪺既承召命便當趨造别乞改授近下初仕品職以効涓塵縁舊患脚氣發動及腰背痛楚艱於行立又兼新病有差來官日逐守候恐妨公務亦乞召還辭免國子祭酒狀七月十六日承奉陜西等處行中書省備中書省咨除㪺集賢學士國子祭酒依前右諭徳又中書省差薛宣使欽齎温字七十八號四匹鋪馬之任聖㫖及行中書省參知政事趙資善一同禮請卑職疾早赴任承命震驚神識迷眩念㪺賦性愚暗學術空踈名浮於實多誤朝聴前大徳十一年冬病中拜諭徳之命不敢固辭力疾載行自十二月二十一日起家二月二十日方到闕下又伏枕月餘四月二十一日拜覲東宫杖䇿人扶艱於趨造惛忘錯誤不能應酬曠職素餐空貽罪責東宫憐此羸憊命使送還歸家妻没未藏疫疾滿室悲憂困頓精神耗竭忽拜新除愈増惶懼人微學陋猶未論及只此沈痼實難勉强惛忘恍忽常若夢中足膝恒痛泄㵼頻作夜不能卧坐寐達曉日惟指使無力語言醫藥無功飲食漸减即日未能前去除將元給之任鋪馬聖㫖欽領外候疾稍愈赴都合行具呈陜西等處行中書省照騐施行書辭免陜西儒學提舉書某蚤事文墨見一時髙才絶足趨事功者效之不能是以安于田畝讀書為事本求寡過不謂名浮于實聖恩横加竊念聖人之戒必明徳而後新民成已乃能成物昔夫子使漆雕開仕對以吾斯之未能信然則心術之微雖聖師不若開自知之審今某學行未至自知甚明望達廟堂改授真儒則朝廷得人學者得師某亦不失為寡過之人矣與同寛甫雷季正書承示堂上無恙甚慰數日來天氣凉想更調適也季正簡諭朝夕哭猶生時定省之禮固是然此自是未𦵏時禮也又云入廟後節降亦是如此但㪺初妄謂有奠物猶可不出主則無奠而拜或可不出主乎若在几筵時朔朢自有殷奠禮倣質明已出主拜奠哭如儀與入廟後自不同也㪺初疑主似父母形體而匵猶屋室然則隔門致敬似是非禮今再考之自反哭時匵主於靈座既而詣之哭則已不出主至虞祭時納主後方哭而再拜辭之則是主在匵中而有可拜之禮自是之後罷朝夕奠仍朝夕哭則但哭無拜可不出主明矣至於小祥朝夕哭亦止何縁又復出主乎又祠堂條晨謁及出入辭參有所告語皆大門内焚香再拜惟經月而歸則主人開中門夫中門外尚可焚香再拜則在匵中其可亦明矣則不與隔屋拜人同也所可疑者既入廟不廢晨謁則在几筵安得不行定省之禮故但不出主焚香再拜其亦可哉原注在靈座則定省于匵外在廟但晨謁於中門外然終不見出處蓋考之猶未詳也若専泥見主方拜之意則恐又似向來覆藉魂帛之說矣二兄以為如何幸徃復詳究有定論然後將改之去人怱怱不謹希情恕七月十三日㪺稽顙再拜墓誌銘元故榮禄大夫平章政事議陜西等處行中書省事趙公墓誌銘古先哲后之御天下也為君為師治之教之故為教易行人才易成昔聞其語今見於公矣公年十二入侍世祖聖徳神功文武皇帝朝夕左右僅三十年天地四時神氣之教變化漸摩成就者非一故其徳器敦厚質實忠勤亷慎謙恭簡儉大異於衆公諱弼字元輔上世居澤之晉城祖某大定間進士妣周氏考得賢豐州軍民總管從征蜀過秦樂其風土迨謝事徙居雲陽遂為雲陽人妣楊氏張氏以甲辰嵗五月九日生公二嵗而張夫人没楊夫人鞠之同己生孩提言笑不為兒嬉聰頴喜讀書五六嵗知屬對識者必其異器嵗甲寅總管君卒明年楊夫人挈公以玉杯名馬贄覲于六盤淵龍之所給事行内未嘗有過上愛之嘗冬狩野宿寒甚命寢御衾中四征弗庭恒扈從駐蹕鄂渚笞不共命者公亦跪曰無功當責上笑遣之曰童幼未能立功也上毎御輦必坐公于前凭之乃安夕則令左右講說故事因問渡江時事公終始全舉無遺上大喜嘗命出使秦蜀及沙漠他日使還上必問及水旱豐歉田里休戚邊陲利病官吏能否人才物産公於是一一敷奏悉見施行至元十七年以近侍服勞最乆特㫖授朝列大夫符寳郎明年改局為監進通議大夫典瑞卿賜之玉帶當至元初樞宻機務悉委平章張公後難其人十九年上選授資徳大夫簽書樞宻院事屢以徳薄位尊辭明年改嘉議同知大都留守司本路都總管大興府事兼行工部尚書以才力不逮不能並舉數職辭之再三又明年除同知大都留守司兼少府監事如故官别敇監修白塔石佛等寺二十二年陞資善大都留守兼少府監事輦下浩穰叢劇數號難理公既獲乎上無敢齟齬沮撓者事以辦治聞二十八年轉資政宣慰荆湖北道上毎謂荆南重鎮必慎擇其人自平章亷公後鮮有能繼者乃特命公徃既至宣布徳惠廢置利病時雲南緬僰八畨諸藩閫貢篚庶物浮江而下及襄鄧徃來轉輸相望人畜疲斃古有漕河繇亡宋乃潰泯其迹乃命相度濬治四閲月以成民感其惠銘曰趙公河刻石頌徳江陵驛尋加資徳河南江北行中書省右丞元貞初以先朝老臣進榮禄四川行中書省平章政事為政主乎愛利人以佛呼之大徳三年省革即拜平章政事議陜西行中書省事自入蜀後屢以耄疾辭不報五年五月五日薨于安西順義里私第之正寢明年八月乙酉塟雲陽縣金龜鄉蔣村西原先兆之次夫人姚氏陀囉海氏皆先卒祔焉九子男曰獻可大都留守受知三朝鼎貴矣曰獻翼曰托和齊曰徹辰俱國學生曰伊嚕勒中殤女四公既早孤未冠楊夫人亦殁皆在殯其後至元某年始克𦵏痛平生不得致養毎拜掃必慟哭又曰楊夫人顧復成就之徳人不可及尤不能忘也其於族屬無藏怒宿怨一盡愛敬之誠乆侍帷幄無一言之妄世祖以老實目之有毁之者上怒曰曽似爾輩姦宄欺罔耶日侍禁中從者惟攜一瓠壺􅀈粥瓜菹而已故眷注逾渥朝廷嘗以官提刑按察者多不職將改為肅政亷訪命二品以上㑹議中書公謂但當擇人安有愚於提刑而賢於肅政者識者韙公言凡忠謨讜議顯賢進能興利除害皆宻告於内所薦者終莫之知為政不煩與人以信不作聰明一守恒度故吏得其職事無所闕失初公至行所敕邇臣之賢者董君文忠為之主遂結為兄弟子孫繼序之承㫖李野齋參政王子貞皆嘗同僚每歎公之誠實謙和節儉雖有學者不能及也接士有禮或先拜之權幸臣方柄用一時趨附惟公絶不相與阿哈瑪特風使附己許為增秩曰富貴在天祥格使求玉帶許為同列曰聖主所賜不敢與人毎蒙蕃賜常異於衆前後不可殫紀而自奉有節毫髪無貴驕氣見人常盛服或屢易衣者毎蹙額曰豈無他日耶少為兒女留可也五十後始還故里時已隆貴凡親戚父執之家皆躬詣謁識來者必迎送于門外嘗語諸子曰我叨蒙兩朝湛恩位崇禄厚無功于國家徒積戰兢汝等當匪躬事上以不欺為主其餘一聴於天嗚呼可謂知事君之本矣銘曰於穆天命至誠無息於皇聖神與天合徳誠之者人以人合天維語不妄行之所先昔賢力行七年乃成公出天質童髫以能維此天質重以學力君師是式迥出羣匹帝成厥美名之以實乃司八寳乃簉宥宻判留于京百工是程珠㡌繡衣以賞以旌分轄于汲藩宣于荆復漕愒民洋洋頌聲辨章蜀秦人謂曰神維信維恵好惡必循五十八年蒼髪未雪國䘮忠良民望永絶公則有子祇訓嗣事實發實似實求公誌金龜之阡下從其先既安既固胡不萬年故中順大夫江東建康道肅政亷訪使傅公墓誌銘公諱巖起字正之初名良弼其先華原人也世以孝義稱祖贇妣雲氏考汝礪陜西都轉運司經厯妣李氏自有誌公天資警悟蚤通經史首事李忠宣公為府掾及忠宣經畧河南宣撫燕涿瀛保皆驛召辟用亷平章行中書省陜西又辟焉陞右司提控舉為承事郎遙領華倅尹咸寧平賦勸農笞殺不子禁絶頑民十虎者進京兆總管判官盡瘁叢劇取重府主加承務僉四川提刑按察司事分按施黔山谷幽阻無不至彰善癉惡一部清整徴拜監察御史超奉訓大夫平内濟脫其死劾贓吏陳利病舉人才知無所隠初盗殺權臣上眷猶未衰賴内濟極陳其惡始怒致辟民始稱快復以它事上震怒命省臺雜治内濟罪公言此人脅從罪己自陳首且㑹赦今無所坐時相雖宿憾不能奪事間霽威乃免遷刑部郎中詳决無滯獄出副四川西道宣慰使加奉政㑹討烏蒙諸蠻夷兵甲芻糧辦改副宣慰荆湖給征交趾軍資如在蜀諭定雞洞四十三口三百九十五萬辰沅靖以寧轉陜西行中書省理問所官尋加朝列四川轉運使疾未赴改授侍御史行御史臺事浚大湖故道水大息害分臺江西湖廣兩省風威著立以老疾辭迨至今職黜黠吏抑豪横舉綱維謹繩榘鎮服安靖崇儒興學江東昔號難治臺考績最九道以老秩滿累辭不報投牒徑歸大徳六年四月二日卒夀六十九蓋朝廷知公才具任毎未終命輒下雖老疾猶不舍也五月三日從𦵏長安縣義陽鄉槐衙先塋之昭公有至性三嵗時河東官司以經厯君私還鄉欲罪之即哭抱持官異之而免平居承顔養體克致其樂侍疾嘗粥藥不離側衣不解帶䘮𦵏哀戚誠信毎拜新命輒哀慕見於色蓋終身未嘗一日忘其親與弟良臣良佐極友愛遇族姻舊故曲盡禮意規益朋友必竭其誠而復孶孳下問取人為善尊敬鄉閭耆宿訓導後生接人雍容笑語未嘗有一毫貴宦氣故卒之日哭之者皆哀戚疾革戒二子曰吾年鄰七十位至三品公私無負死無恨然自揆有何才能皆祖先積累而致念所以為報唯有孝悌忠信揚名不朽庶以光顯先世吾一生兢慎儉素僅能寡過汝等當勤學以成徳以終我志可謂能子矣公凡兩娶夫人張氏長安令仔之女婦道母儀族里取法前二十四年卒夫人宋氏平章鳩水翁之女佐君子無違徳子男二昱樞宻院令史杲侍行好學女三適董思義袁恢者皆歿少適董思恭五孫男和女四俱㓜比𦵏昱持公之友鄭子誠所狀行治乞銘於北海蕭㪺曰昱逺逰不得娛侍膝下頃以告省疾自洛甫歸而奄棄諸孤哀曷可忘幸與之銘庶少慰存沒㪺以故舊不得辭遂書銘𤣥石曰唐虞之際得人為盛猶曰才難於維大夫敦敏清慎詳達靖端敭歴中外卅年九政舉能其官不苟不激辟歴有手澄清有源深入瘴阻溪洞聽盟皇靈乃宣巴蜀湖江民吏恱服徳功具完輿歸先廬考終天命親婣滿前顧言勉學以繼以述規模廣延噫爾後人勿替引之履氷臨淵銘雖匪古有舉無廢永識幽泉故中順大夫山南道亷訪副使王公墓誌銘至元三十一年九月乙亥中順大夫山南河北道肅政亷訪副使王公諱瑄字君用夀五十九卒夫人粘罕氏與其孤承事郎洋州同知温四川省掾淑及沖洽卜以十二月庚寅𦵏于咸寧縣龍首鄉春明門東原之先塋前事温淑持公之友安定鄭中子誠之狀求銘于北海蕭㪺以故舊不得讓為之叙曰公世居藍田大父而上金亂失其譜幼知嗜學稍長能循蹈繩矩謹飭自將入以事其考經厯君珪妣白君服勤致養唯所欲出而事京兆尹文法明習精力無害一府推重之識者知其逺到矣咸陽上二刼盗當死公異其掠創盛而見贓缺察其寃熟詰之則本其弟竊他逆旅行槖至咸陽取衣易食為縣卒執訊不勝酷毒誣引其兄爾而槖中文書留縣函帖取書因得槖主皆釋之至元十一年參政商公相安西王開府由秦屬省掾署王府掾史未㡬以能擢都事授承事郎商相有純一平坦之褒焉十四年右丞布哈安西相李忠宣公行樞宻院成都陞王府長史兼行院經厯轉承直旌以金符嘉定火適兩樞相行邊公攝事發萬五千緡賑之僚佐懼公曰民初附未安遽罹此灾今流散滿路脫致他變則所失豈啻什伯耶請以身任朝廷韙之明年遷奉議大夫四川行中書省左右司郎中二十年改奉訓僉山東東西道提刑按察司事濟州漕渠當修主者怙權臣為姦徴石十一萬以上民發冡不能治莫敢誰何者公案得贓四十餘萬緡别具當沒入者唯四千餘悉給主督之月餘畢民稱頌至今明年驛召除御史臺都事又明年復為四川行樞宻院經厯陞朝請院革為省除陜西四川行省左右司郎中省析為二公至四川幕二十四年改陜西漢中道巡行勸農使居二年㑹理天下財賦分命雲南平心徴理逺夷感嚮道嬰末疾未復命明年加中順雲南諸路行御史臺侍御史疾未赴二十九年除陜西行省左右司郎中力疾署職月餘雖去年拜肅政之命不能赴矣公貌魁碩氣剛毅而謙恭謹敏律已奉法齗齗務盡職分省臺叢劇詳閲審處無廢閼不撓貴倨不忽踈簡人服其恒以屢職參贊功不獨居故無赫赫稱然平生不知持牒求仕未終任輒遷蓋其夙夜劬躬為朝廷所知如此斯豈公一身之榮哉亦足以勵勤恪抑奔競已若參政商公挺提刑胡公祗遹王公惲司農尚公文皆號有鑒裁慎許可于公則推挽延譽一無間言者公議誠不可誣也居家謹倫理厚意氣毎以學必適用勿事浮飾教諸子即其所以行己也嗚呼詩言不懈于位民之攸塈使公宰方州殿巨藩其休息元元亦豈居漢唐良吏之下而徊翔簿領間所見止此豈非天耶夫人襄樊九州長官烏延之女養舅姑相夫子無違徳四男皆好徳克家二女一嫁李持志者先死一嫁姚義勝孫男四喜璋𦙍璋閏璋益璋女一皆幼銘曰相古為治出于一奚而分裂乃自適傲然疏率謂非屑有能練逹覆賊墨凛凛大夫允詳宻不忮不求奮髙迹民物吐氣凶倖抑凡厥攸居藹休績漢廷風彩孰可匹次公寛明長孺直修途未究車亡軸吏失所師臺閣惜後人善述永貞吉公乎不亡安此室
