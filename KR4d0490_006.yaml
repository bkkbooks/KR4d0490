body:
  text: 勤齋集卷六元蕭㪺撰五言律詩送濁玉甫赴畨陽鎮軍府幕濁子江南至劉生墓已苔十書九不到再去幾時廻幕府傾髙議安輿恃老萊經過釣臺下為我一揮杯繼韻憫雨為農仍惡歳何以豁襟顔狠暑工為虐驕雲不出山禋雩那有聽造化頓疑閒三歎瞻雲漢吾生爾太艱繼韻謝張庸齋亷使見過野人朝食罷把卷負晴暉傳報行春客經過問草衣惜無樽酒具空作簡書歸向别留佳藻光生白竹扉送人歸漢中客來破岑寂衣緇馬𤣥黄已矣貢公喜歸哉氷氏鄉慎初原有道善後豈無方巷有怡然叟相從樂最長和人見寄屏跡惟藏拙全生敢近名來詩多溢美内省祇深驚畫虎空貽笑癡蟬枉自清巴人酬郢曲留滯不能成次韻答劉汝弼見寄之什時汝弼客德慶侯第春事今餘幾花枝巳不多向人愁作客思爾積成痾威鳳翔髙漢慈烏戀舊窠平津東閣好早晚定相過彭彦寛之藍田簿佐邑鄰封好時能見老親宦清無暴客俗樸少爭人花塢魚羮美山瓢玉液新雲霄當自愛臺選在臨民寄僕散公海角睽良覿年年擊石光離憂恒耿耿清渭日湯湯静想研羲畫閒應集藥方培風看鴻鵠漢刻願模將哀李忠宣公清獻丹心苦伏波老氣遒遐陬爭嚮義夜壑忽移舟髙詠詞華盛尊名禮數優九原應不憾玉樹藹西州送趙彦卿由貢北上水擊看鵬運賔興感鹿鳴鉷釗防覆敗河隴著㢘平落落松筠操依依骨肉情杜鵑啼正切惜别淚交橫挽醫教武君煜若家聲逺温然德義充不因三折困妙得十全功恩綍重重渥明珠樹樹同已聞歌薤露猶及扇芳風挽崔公度教授詩驚絶崔夫子乾坤有若人嚴霜何栗烈老栢獨輪囷方輟𤣥文筆俄飛絳帳塵九原如可作猶擬問迷津七言律詩寄太原僕散使君聞説并州喜欲狂思君不見欲飛揚千年怪事程生馬半夜孤啼狽失狼玉潤珠明雖暫隔龍跳虎卧遽難忘公餘遥想多珍翰汾水西來鴈有行讀季卿諸君詩用叔經君侯佳製韻羡君取足不求餘神宇安閒疾自除道可濟時何必去利如生怨祇宜踈水能隨遇知行止雲自無心計疾徐人處乾坤最靈貴一皆實跡豈空虛二十四日得句四月已降何多蠅驅去復來㨗如鷹撲縁眉目無可奈浮沈粥藥還相仍族繁黨夥困病客寧神靜慮無由能安得霜風一快掃九原瓠巴呼不應送亷公邁覲省之燕愛子初齡靜以方盍簪未幾忽離觴從兄覲母何多喜附翼攀鱗未可忙輦轂芳華當擺落箕裘事業要張皇直須言行無交病他日髙明豈易量送張晦甫代其父之吏部氷霜栗烈去何辭大軸無非幹蠱詩循吏徴科元自拙春官衡鏡豈容私共推學力紬金匱合有嘉猷禆玉墀儻為西川問民瘼發棠端擬救饑羸原注時方艱食九月十七日益都歸精衛猶償萬古寃為人寧不痛傷根危時莫得考終命清世未能歸九原踽踽孫曾徒飲泣倀倀凡庻竟何論此生苟獲存餘喘九死終當叫帝閽送杜熈正詔蠲逋負選名流鈎考精詳孰與儔方出錦城秋向杪及歸蘭省歳還周中年政苦親知别長路况當冰雪稠後㑹悠悠定何許欲隨兒女挽衣留簡飛卿從善重陽曾約上崢嶸遐覽冝搜酒一盛未必隂晴為我地巳瞻水玉照人明幾回見客詢山徑半夜呼兒問雨聲滿眼黃花開欲遍東籬采采獨含情次飛卿兄韻白雪辭髙屬和難眞成逐寸挽黃間百憂耿耿人空老萬事悠悠春又還多病只知親藥物一尊安得共雲山程書勤劇如秦法枉却時人說愛閒寄答李昌道次韻寂寂林居寡所親若為姓字徹東秦百年巳矣付牛口一日乃爾登龍津善重瓊瑶非可報名浮悚愧覺常新君侯汎愛誠多可未必雲山許濫巾寄答王眞卿贈椶竹杖椶竹為杖尺度足稱我白頭多病時斬根削皮眞紫玉以心語口疑桃枝行吟行樂殊生力看月看雲適拄頥安得化龍騎便去蜀中聞說故多竒椶竹杖不學湘筠染恨深海椶化竹世難㝷幸逃割剥小人手還喜棲遲君子林蛇跗龍髯餘故質鐡肝石膽變虛心風塵澒洞多豺虎何止相扶伴醉吟送程飛卿之武陵尉落落平生鐡石腸一官聊復為貧忙抱闗無曠心常愜忍渴徐趨味更長便貿春洲栽橘樹終期夜雨對藜床浮雲變滅君應識宇宙無窮日月光莫嘆中年始入流也勝苦雨賦牢愁非闗之子謀身拙不解兒曹繞指柔定有熊羆驚吉夢可無鞠麴禦幽憂他時去作桃源主南道慿君百不求病瘳自警我生憂患苦相仍欲話茫然數不勝羸臂八年三見折危魂一夕九為升體胖心廣嗟何及族大子賢那有徴一事從今須十慮吹虀當為熱羮懲寄熈正市橋官栁又摇金風物應撩久客吟杜宇一春啼更苦文君千載恨猶深風雲入手心雖切兒女迎門望不禁總道吾廬勝錦里當時李杜果何心劉叔經宣慰分遺蜀柑太夫人所寄黃金三寸昔嘗聞緹騎雙持意萬鈞十月繁霜增璀璨九秋清露飽輪囷韻生齒頰餘酲失香溢肝脾琢句新嗟我永無懷橘樂感君嘉貺一酸辛餞止軒大隱細讀滄浪竹裏吟古人糟粕見君心璿璣豈是池隍物麟鳳難為苑囿禽顦顇蕨薇全大節飄零詩酒豁英襟世人不解聞韶意爭向區區肉味㝷半生山斗夢魂飛一旦青天宿霧披健筆長驅無俗駕髙談英發不凡姿離情惨澹從兹夕後㑹微茫定幾時且挽征車判一醉西風摇蕩菊花期送白天民以貢北上九萬風鵬海運初愛君苦恨盍簪踈翩翩庾信縱横筆衮衮春秋内外書騕褭騰驤千里近鷦鷯棲息一枝餘祗愁富貴還相迫不及精良載道車
