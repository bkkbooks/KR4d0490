body:
  text: 勤齋集卷三元蕭㪺撰墓誌銘元故淮安路總管髙公墓誌銘少中大夫淮安路總管兼府尹兼管内勸農事髙公以至元二十四年三月癸丑卒淮安壽六十六歸殯真定後十九年當大徳十年季子璉始克遵治命奉公之柩來安西明年己酉葬長安縣華林鄉潘家里新兆夫人邢氏董氏祔前事璉介雲南憲倅馬君季鄉持洧陽孫君敬履狀謁㪺乞銘辭以不文不聴乃叙之曰公諱良弼字輔之世平山人祖俊民不仕妣呉氏生二子進金鎮國上將軍守同知滑州事林皇真定交鈔庫使以本富樂施與時稱長者公之考也妣門氏三子公最長幼警悟端重有成人度真定火盪空千餘室公請於庫使君曰鄉里安則吾家安宜有以賑之君悦許且竒之曰大吾宗兒也既冠宿衛世祖皇帝潛邸忠勤自將為上眷注俾主藩邸全趙金糓通商平估經入屢登嵗終輒請㑹上曰主財者恒懼檢閲今髙良弼數請㑹計非潔身者乎慰奬甚渥至元二年擢奉議大夫同知汴梁轉運使授金符六年春調河南路課稅拘榷使八月進少中就除轉運使汳洛民物殷夥事叢網密人易觸禁公居仁恕而行簡易寛以惠來嚴以絶欺盡罷押遞冗官擾民之屬故田里安商旅輻輳課恒入優等明年夏旱蝗公謀諸僚屬曰用兵襄樊河南為重地今流莩日甚奈何衆永歎而已公曰計諸倉儲米足支嵗餘若取其羨乘貴而賤出與民嵗熟以糴猶多贏益縣官苟濟此艱厄善政大惠也皆不敢公慨然曰脱有罪吾任之即自為請於南省報未下亟發倉以糶衆賴以生存執政韙之是嵗至於八月不雨公為壇禋禱越三日大雨蝗盡死秋以無害衆欲紀之石公曰上天之惠大君生靈之福我何與焉竟不許民復歌之曰開倉發粟活饑民因吾髙使君晚苗足雨緑堆雲賴吾髙使君􅏨期待得明年春直赴鸞臺借吾髙使君洛人道之至今屬圍襄陽而糧不繼羽檄和糴督民自輸于軍人大恐公言之南省請倍見估募商米可不勞而集史忠武公然之即以諉公不閲月倉儲皆積凡主彼邊倉六十餘出納嵗百餘萬石時歴境襄均棗陽光化或糴或運以給軍行省褒賞上其最于朝十年改朝請知鳯翔府戢豪横撫善良推誠任能吏民信服虢縣人渠汧水以溉而利未廣乃詢衆審勢量功命官鑿渠三十里而遙不奪農功再冬方畢溉餘千頃激磑十餘名曰善利而人名以公之姓故陜右憲僉劉君仲脩有黎庶喜長官賢千載世間傳長短句以紀之劉君端介慎許可者也十三年授中順同知陜西四川轉運司事使貪黷怙勢公常規切懇懇引古權倖誅滅者為戒而終不悛乃介然自守凡涉非法皆不署及敗一無所與置别業水竹幽邃既踐更屏迹園田讀書教子以自適二十二年即家拜少中大夫知鎮巢府未赴陞淮安總管仍故官郡嵗造海舶市材億萬計猾胥豪賈陰相結以虚文盜厚利為故常公至吏抱給木商直四十萬緡成案請署詰之曰嵗用木幾曰僅一萬見積幾曰十三萬何為復市曰省帖奉詔備預務廣督以軍興孰敢議同列一辭公不聴上之行省言見木可支十年餘地卑濕將朽棄不勞重市羣商夜以五萬緡為賂公叱去翌日行閲見木則雜亂不可究命以廣厚别置及十之七是夜火作又窮竟榷酤姦匿方有迹而火亦作既而商人持省報不許公憤厲歎曰蚤被湛恩膴仕四十年每恨無萬一補忍視鼠輩耗蠧縣官邪再擬力言而疾已殆矣聞者痛惜之後二年大㑹天下則罪人斯得多破碎其家或瘦死者人稱快公忠益明公兩娶曰真定監軍邢某之女有婦徳生二男二女前公卒曰檀州元帥董某之女謙厚慈惠多内助母則逾謹後十年卒子男五琬宜陽尹後公三年殁葬新兆之昭璠中殤藏公墓後左珪征交趾海船總管殁王事璉師事四川憲倅劉存齋季偉力學篤行瑾方學女三季者死其成都三務提領閻郁鄂州行省郎中郭孝華州判官魏餘慶壻也孫男一思誠女三長適王秉故元帥府郎中正之曽孫餘在室曽孫三男二女皆幼公弟良輔良佐居真定葬西原頭祖塋在府治西北三里所仲之子三璋珦瑄居汲季之子二瓘玠在真定公誠直嚴毅瓌偉豪邁喜賓客禮敬儒先名徳南陽楊子中稱公明敏精練有聞於仁義道徳天理人欲之說當生民利病政治得失見義則勇斷力為惜拘於金糓之間不能盡其才也時謂實録嘗訓琬等曰吾奪於官事不得極意講學今老矣於簡編獨有眷眷焉者若曹其必成吾志嗚呼公之教子其知所務矣銘曰維天生材成世之務用舎在時匪材所與用枉其長水車陸航十亂同徳扶皇之極維官維友維内貨來疵之熾矣材其殆哉蠧政瘼民延及於國殷監在夏孰懲斯慝矯矯大夫饑世菽粟當義勇為不啻嗜慾餽運有方金湯屹存靈雨既沛爰出格言洛京有謠岐下有歌秉彛好徳民心靡他廢國遺頑姦宄凶詐恢恢天網靡有攸赦人之云亡我心憂傷繼述無忘繄後人之慶元故承直郎甘州總管府判官李侯墓誌銘至大元年龍集己酉三月戊戌承直郎甘州總管府判官李侯希顔以疾卒官舍孤鼎聞訃哭走張掖奉其柩歸卜以其年十月辛酉從葬於咸寜縣苑東鄉先塋兆次合于趙夫人之藏前事鼎持侯之甥王弁狀偕弁泣拜請銘重傷孝子心不忍辭按侯諱之復上世居雲陽繇經歴君始遷京兆大父耀金以軍功官進義妣仇氏考唐皇將仕郎興元總管府經歴妣趙張呉氏侯生而警悟異凡兒長師文正許公暨寓庵李先生通六籍百氏之言以府學生貢為按察書吏辟安西王府掾復補掾陜西行省平章額森公宣慰陜西漢中因又辟署逮改行省事獨見留焉至元三十年調承事郎同知鄜州事大徳三年轉峽州路總管府判官遷承務十年改甘州侯天資孝友事經歴君怡怡焉先意無違有疾侍粥藥不離側居喪哀毁有聞奉二繼母無間言襟懐洞然無城府在鄜時則有同僚以私立異恒背憎於人而侯但稱其善蒞政精詳明恕在峽時則有北庭人為監郡怙侈驕恣人怨之嘗欲告其不法肅政者羅織繫獄議坐以不受逮杖之以逞侯適至官反覆忠告善喻且固執以為不可乃釋之始殊鞅鞅既乃深悟其失以先生見稱多從其議有婦愬饋夫圜土而獄卒取其黄金釵如干於首憲長怒掠卒服罪而釵無有諉侯覆鞫先别而訊釵所自其夫曰服賈所獲婦則曰賈資也察其妄詰之曰細民納食囹圄何盛飾也婦辭屈服罪平居儉素而周亟宗戚無顧惜於妻子和而有義慈而能教嫁子一從姻家治具絶委巷需索慝禮行己亷慎論議正公接賓友則燕笑語而不流宕緇黄巫媪絶跡門屏初侯至張掖行中書丞相托廸公賢明少許可耳侯之素目侯寛裕通朗遇之特厚寮寀悉師敬之侯以旅喪僚屬為主從浮屠法飯僧拜佛通夕不懈及殯率素服挽紼以哭茲非有以悦服其心顧豈髙勢小智所可致然哉惜其回翔佐職不得展其藴也三兄皆先殁長某次之得之徽之徽嘗主渭南簿兩夫人趙氏楊氏凡六子男三漸先死次鼎也謹厚克家升嗜學女三嫁鄭思義者夭今壻王弁韓克猷銘曰聞之才勝莫如徳充趙張有稱終愧黄龔維侯雍雍清而有容明慎祥刑一恊于中三毗劇郡豈弟彌縫無怨無惡于家于邦甲子一周壽匪不融惟是喪歸有識時恫銘以識哀刻閟幽宫元故文學薛君壽之墓誌銘至元壬辰秋秦王妃聞平陽薛氏董母賢召之其子延年壽之扶輿而西至則以經訓輔導明年春得告賜金帛官其子開成教授而歸再授王府文學壽之皆以侍親不克赴居長安東郭士夫延之以淑子弟後六年母卒因舉祖考妻子之殯于平陽凡五喪葬咸寜縣龍首鄉芙蓉園新兆力貧襄事人以為難又十五年當皇慶癸丑壽之年六十二八月戊寅沐浴正衣冠而終哭者皆失聲君天資警悟八嵗孤母氏方闢館授徒如韋宋付之男塾諄誨不煩或稍踰繩檢必嚴夏楚君亦痛自砥礪卒臻有成葢繇冠嵗即代母講授斆且學不離簡編者逾四十年近世評辛敬之真特立之士唯君為可當之痛孝養不逮扁堂曰風樹晚嵗以秋潭自號葢中有所得云有妄人談易飾賤術名宿納侮長其聲燄君詰以乾六爻三四不言龍夫子謂時乘六龍何也彼結舌乃攘臂戒曰勿復敢爾其力于衛道若是其素藴見詩文琴阮六書則所專業至于醫卜圖畫裝襮率皆能之有小學纂圖本草圖四書引證秋潭良方鐘鼎大小篆韻琴譜秋潭集五書傳于家顧言不用二氏勉二子學以良其嗣人其族世爵里見考省掾君誌兩娶髙氏前殁三十八年今無恙清規懿範克嗣無替三子曰吁天噰同州學正喈學直二女壻董大中一幼孫女一將以十月庚午禮藏髙氏之竁前事噰狀君行乞銘終辭不果銘曰三代庠序人嗟不逢化民成俗孰大其功胎教之徴有才有容是母是子伊誰比蹤風樹揺悲秋潭鏡空不亡者存寜哉一宮故孝義張君墓碣銘君諱貴張姓世為三原人考順妣馬氏生於金承安五年庚申之嵗正月庚戌魁岸足勇力上氣義喜施與家故饒財素以醫術聞君則謂人命所繫至重遂更為神農之言屢内徙荒饑扶攜父母弟妹逃難商於復與弟妹相失采拾以為養流寓河東諸郡嵗丁酉關内甫定負父母歸復縣之鑑里故居守松檟剪荆棘力耕鑿樹桑果始營生業嘗市糴京兆得麰米鹿車挽之而還遇盜數人將奪之君懇告以致之之難二親待食之急必欲見奪是害吾親吾不獨生誓以死鬬盜熟君名度不能敵乃留置其半而去居數嵗訪求宗族得二十七家并外親王氏其子孫貧窶者不得藏即為之棺斂列葬祖塋西繼聞弟興及妹為俘即以金帛贖之于豐州于泗上骨肉完聚且為昏嫁有室家二親樂之妹適劉全而殁遺女及笄為擇晁清作贅未幾女亦死君哀妹甥早世則娶張氏女妻晁且析其産與弟興及清三分之清感恩誓不離異初寓河東日遇四孤女問之亦三原人遂收養與二親居禮如親妹至是亦為擇壻嫁之其好義若嗜欲不顧有無類此君有至性初逃難河東為土兵所獲主帥議坑其老者而以壯者從軍君聞之罄其槖以獻主帥哀號百拜乞以身代死情意迫切有足感人帥憐而釋之葢終其身未嘗離膝下既而再執親喪禮不足而哀有餘葬以昭穆次君子韙之至元壬午十月二十有四日終於所居之正寢享年八十有四配雲陽孟氏同里楊氏皆先殁白氏後二十六年當大徳丁未三月五日終壽八十八於至大己酉三月二十有六日合祔於祖塋之次君之子男二曰徳明封奉義大夫信州路鉛山州知州驍騎尉涇陽縣子直諒潔厚集賢宋公渤翰林鄧公文原紀贊其行曰珍先逝女適劉資者殁楊出也一適王真甫孫十一人男七世英河州路寜和縣尹世昌敦武校尉圖沙瑪路新附軍上千户佩金符贈文林郎陜西等處行中書省左右司都事世傑承務郎同知威茂安撫司事佩虎符積官奉議大夫同知河州路總管府事世榮承務郎僉海北廣東道肅政亷訪司事特授繕工司丞世良克家世寜土蕃宣慰司令史世貞好學女三壻曰王温劉良朱安仁曽孫十六人六男信儼俊儆儒林郎江南諸道行御史臺監察御史佐儉十女段珪李温李居仁黎恭楊灝王仁壻也餘在室𤣥孫男一履女幼君弟之子男三曰徳曰才曰義女三孫智王秀劉直其壻孫男四子顯物故世亨世美世禄女七曽孫男二女一𤣥孫一徳明持所述君之徳善介彰縣彭彦寛謁余銘墓隧之石辭既不獲銘曰洪範五福民鮮克備猗與張君盡有其懿孝友睦婣任恤以義子承義方為時所臧諸孫濟美符節煌煌曽𤣥詵詵其來未艾天命弗僣後豈不大言歸先墳下從二親刻詩𤣥石以啟後人神道碑銘元故特授大司徒贈太師開府儀同三司上柱國冀國公推誠宣力保徳翊戴功臣諡忠宣石公神道碑銘至大庚戌秋八月有六日榮禄大夫大司徒致仕石公薨于京師春臺里第之正寢壽九十有二以是月二十有八日葬于順州南蔡里之先塋有司舉褒䘏之典以請詔石蒙古逹六朝老臣忠勤於國謚贈宜從優異太常集議贈開府儀同三司太師上柱國追封冀國公錫號推誠宣力保徳翊戴功臣謚忠宣夫人和拉徹臣氏夫人摩勒齊哩氏皆封冀國夫人上賜可公諱天麟字天瑞古燕順州人世有積徳為盛族贈中順大夫䕶軍武威郡侯諱祥者曽祖也妣完顔氏贈資善大夫上䕶軍武威郡公諱慶元者祖也妣張氏贈榮禄大夫上柱國順國公諱庭者顯考也博學篤行為陰陽家言五行律厯靡不精究王官麻革銘之墓碑妣薛氏太宗皇帝在御公年十四侍父順國公從行在所因得拜覲蒙睿眷備警衛公勤慤英悟不數嵗學問有成詩禮陰陽固傳家學而旁及諸國書言無不通習聞義勇為同列推服時天造之初條綱未完上命中書耶律公興舉釐革庶務而毗贊難其人僉議以命公事或岨峿每賴以濟因賜名蒙古逹華言猶國族也前代賜姓之通例詔名王帥師征西域王以禆佐為請命公輔行繇是分𨽻為斷事官兼教諸王子憲宗即位熟公才徳復選為諸路斷事官時省部未立猶相職也嵗丙辰命使西北親王遂見留止至元乙亥邊將盜兵刼皇子北安王亦寓止公之處公惶懼深念因彼用事臣數數以宗親大倫君臣正義逆順禍福天道人事反覆告諭彼始怒而中疑終則欣然感悟竟遣公䕶送北安王來歸世祖大悅恩賜蕃庶禮異絶羣臣授中書左丞兼斷事官復命入中書公再拜辭曰臣奉使無狀幸免罪責又才識鄙薄加以耄惛何敢叨居顯榮為廟朝之辱終辭不拜帝嘉其誠懇褒慰良乆然禮遇益隆矣時至元癸未嵗葢留西域者二十八年既而有譖丞相安圖嘗為官于彼者世祖怒公奏海都實親王非敵也安圖不以死拒絶之者政以其他日來庭則欣然無所疑阻於其心也帝為霽怒故今易名之制有韜爾符莭芘我本支扞牧圉以來歸啟羈縻而向化之訓他日帝聞江左道觀内有宋主土木遺像言僧當致之大辟何如公對曰帝后祠像西京寺内終金有之事乃得寢二十六年賜以所御金龍頭杖曰汝老矣拄此出入宫掖無禁也時權臣僧格方柄用凶燄薰灼海内震懾其官人也必陳狀納賄而後遣人莫敢言者公憤其罔上蠧民首發其慝帝益感公忠成宗即位特授榮禄大夫大司徒大徳戊子玉徳殿成以公元老命大臣延公先宴其中公再拜稽首曰殿宇新成聖上未之臨幸臣等何敢當此禮灼知陛下不為一已之安將延天下賢俊論説政事於斯也太平有日矣臣敢為天下賀上深感其言稱善乆之賜御藥且命左右勸之酒是日霑醉以御輦送歸第武宗皇帝加平章事尤蒙禮敬晚節致仕家居清心寡欲時事弗以關懐訓教子孫優㳺數載而終兩夫人皆冀國也夫人端氏未封男六人曰額稜布哈藳城縣達嚕噶齊曰用禮部侍郎曰珪大司農女曰燕適傅氏皆夫人金氏所出男曰輝圖京南宣慰使曰圖戩雅爾穆什山東宣慰同知曰和尼齊常熟州達嚕噶齊女曰逹什札卜適總管胡瀹皆夫人黙哷徳哷所出女曰徳哷適司徒哈勒哈齊曰托克托適總管岱爾馬夫人端所出孫男十二人孫女六人公天資忠厚沈毅周密平實與物無競歴事六朝䕫䕫一節罔有擇言擇行耄期康彊子孫滿前為國元老以厚禄終可謂五福備具矣惜其嘉謨嘉猷入告於内者皆宗社大計不得備書大抵主於睦懿親戢征伐奬忠良黜回遹消物害彰聖徳内隠忠貞不形於外此其可知也㪺又聞之太子賓客王泰亨言公嘗告坐客曰人之為人惟孔夫子札薩克不可違耳扎薩克華言猶法律也問公有之乎曰有俾取示客則編之以韋如西域書乃論語也嗚呼今孰不讀論語以之為法律當守者獨聞于公是宜與夫光靈榮寵同耀無窮其辭曰洪範五福其四在天在人者徳徳備福全人皆好福而靡好徳乃怨乃尤何其大惑太師宣公夙侍鈞天嚴畏格言迄于華顛暨造中書曰預邦政無施不可忠信篤敬西域數萬絶徼之逺繇懿親故凡六往反世皇御天實為親臣謨猷入陳外莫悉聞登善黜惡蠲民之瘼國脈以延皇猷允若列聖誕膺祖武是繩寵光舊徳蕃錫相仍玉盤之珍金罍之㫖賜緡盈億輕暖適體謙抑方崇若衛武公順常教忠全福以終雲章爛然榮生哀死軌度朝紳光昭國史振振公子象賢濟美愛録之誠勤勤無止爰參輿誦爰探綸㫖酌之豐碑式詔千禩墓表程飛卿墓表史氏謂黃叔度言論風㫖無所傳聞然士君子見之無不服深逺去疵吝何哉有人焉仕不隆赫食貧守涯分然名公卿大夫咸謂之古君子忘爵齒與之交莫不得其歡心没而哭之哀乆則思而不忘又何以哉可為叔度之流亞乎君程姓諱鵬霄字飛卿浮山人始從都漕周侯督兵儲籌筆漢中由幕僚胥保惠教誨至親愛如天屬及來長安轉運使馬公官以照磨接之若賔友又提舉規措解鹽于懐孟獨無逋懸荐居二親憂哭泣幾喪明友善席郎中治夫往來康楊先生之門先生稱其善信若提刑西谿王君子冕總管李侯彦瞻皆賓敬之或訪以道至元丁丑以薦提控案牘興元而總管安侯至號風力聰察初頗猜傲已而見知反更親倚數至所館如故交漢中比嵗作􅋣疏黒龍水為沃壤工物之費夥府主例親督其役諉君攝以往則藜杖芒屩與之從事安侯時酒饌勞之工省而成速且堅以乆人稱之至今除武陵尉屬新内附巨盜恣雎剽居人殺鎮卒守帥大府莫能戢君曰此吾職守可尸素耶以疾歸秦士夫家多遣子弟從之學至元二十九年嵗在壬辰九月二十七日卒年五十七葬咸寜縣龍首鄉先塋之穆妻張氏先殁無子長女壻王恪奉議大夫同知鞏昌府事中女壻鈞臺韓徵君擇自君初疾及大病在君家視粥藥襲斂絞棺窆虞悉如禮君嘗言吾家葬于此三世而絶他日合三封為一庶能乆乎聞者哀之參政趙公彦澤曰可刻石為識于是擇方買石表墓而疾亦革顧言惓惓思終其事少女壻徐某江西行省檢校余在京韓君書來曰石已具與君㳺者惟子在其尚成二公之志間念叔度言論無聞而史氏為之傳若君者有道君子名公卿士愛敬之猶叔度也而又䇿名天朝勤勞王事無曠無玷是可述已考諱榮母劉氏名數河東而葬于是賢者之墓後世其無毁延祐丁巳七月既望建威寜張氏新阡表聖元大徳改元之七月癸酉前總管萬户府詳議張君葬其烈考元帥左監軍上及曽叔祖而降凡五世二十四喪于長安縣豐邑鄉萬村新兆後二年介長安竇長卿來曰僕威寜人也曽大父而上葬威寜爾後從軍宦游隨殯殁所僕既得謝夙夜疚心求之豐雲梁雍者四往返積十餘稔始可舉萃卜兆安西便省埽也今幸襄事猶未表諸阡惟耄期不瞑是懼子幸無讓既不獲辭乃據所録述之云金初詳議之髙祖府君生六子其五人皆失其名字行治壽年獨諱元甫者倫次居三博極羣書雅負髙氣有隠徳教子孫有法嘗誡曽孫庸曰吾家上世儒術相承不幸多難以廢今爾父命汝輩從學儒先當刻勵進修光紹絶緒母徒如武人子事芬華為也壽八十一無子長兄之子防城萬户俊實事之唯謹萬户君娶劉氏生二子子㻞西京大有倉使子瑋字器之元帥左監軍也弱不好弄受學其叔祖無子弟之過長便騎射喜兵法魁岸足武力沈鷙有謀時輩讋服崇慶初金運將終天戈所臨罔不風靡公以威寜縣小不可支遂與劉忠順公等迎拜太祖聖武皇帝城下請無俘殺勸未降者上悦許之俾長千夫撫居人從征伐其五月攻天成勇冠諸軍百夫長王某為守陴者鉤去公揮刀斷而脱之六月進攻西京敗金人黙谷别率千人發掘敵境給軍實明年下山東却敵大帥承詔陞副萬户又從圍燕燕破攻大名飛矢中面戰彌力嵗丙子西京元帥以國王命授都提控從攻汾州明年東拔遂城蠡淄定益都及屬郡五詔為西京帥府都彈壓又明年克太原平陽又明年擊破潞安山絳皆有功嵗庚辰從攻東平十一月詔改都提控後一年從擊鄜坊隰州及太原西山諸屯聚悉平之明年攻鳳翔先登十月授兵馬提控嵗甲申四月太傅行尚書省奏前後戰功多宣授元帥都監其年攻下武仙西山堡栅又一嵗破秦安及黃唐嶺砦復圍益都功最嵗丁亥七月詔張子瑋攻下亡金城邑堡栅積功甚多可陞元帥左監軍尋取楚州庚寅春西京河南萬户奏公兼督捕雍州萬原賊盜復西破鳳翔長子戰死遂受詔與萬户侯劉忠惠公畧宋山南繞出金境始至兩當忠惠輕出覘其壘猝為敵所掩公馳騎疾擊走免之所過麾城摲邑功居多明年合大軍大敗金人于鈞下河南振旅而還于後公以叔祖父母父母年在喜懼精力疲于兵中請以子唐從軍而居閒養親矣嵗壬寅總管萬户奏充總管天成懐安宣平威寜鄂勒事乙巳之十月詔申命前職佩金符仍如初公雖居軍旅不忘文儒家法禮名士詢故實河南還圖書盈車延致鈞臺郭仲通天成事之豐腆命子庸從學將十年倉使君簡潔嚴急事之未始少忤君居大同雖一果蔬必送致嵗時一再往省輒數月留不忍别君來天成亦然方公監䕶諸軍也主謀畫施號令提紀律將士悦服萬户侯倚之為重然每有所不樂也及退而養親事兄訓導子弟㑹族人賔友飲酒賦詩陳説平生則欣然樂之日不足也嵗戊申二月二十二日終天成居第壽六十三夫人温騰氏金殿前㸃檢克昌之孫温恭淑柔宗黨取法先十九年卒王氏金翰林黄華先生孫叔澹游翁患公英氣有餘繩以禮律克盡子壻禮雖貴不衰門氏王氏同里人趙氏益都人子男三某最長殁鳳翔時年二十六唐詳議也庸舉進士鳳翔鄂勒萬户府知事女二長天次適南某孫十三人六男榮祖某之子又長年三十七死安西時生知事子頴悟力學年十六死時舉成都轉運司判官方為之時中時憲皆詳議子時益知事子並好學篤行七女曽孫男五女五𤣥孫男一某尚㓜公兄子二庶弟某山陰鹽使就養殁興元年七十三庶弟五廿六殁安西無子孫男仁義弟二四十四卒官興元鹽茶使女嫁王某曽𤣥各一男子公嚴重有威望之若神居家如公庭雖子孫莫敢仰視故其謀議勞烈不能詳道之其在親前則斂容肅氣如孺子未嘗聞履聲執喪哀戚甚其撫士卒知勞苦寒暑渇饑賞罰明信人樂為効死其與人直以諒是是非非不阿諛茍合其尊祖考遺戒若嚴法令軍府政役殊不及族人㑹族拜掃威寜後一日必合族具教子孫孝義順厚言必稱祖先故詳議由髫齓事四母不異所生今詳議八十知事少三年雍睦歡洽見者起敬慕詳議薛夫人七十有七㛮叔先後間一未嘗小有言時舉復獨給軍事與諸弟事叔父母如二親此皆衰俗中不獲少槩見可紀者也新兆為昭穆次曽叔祖居中萬户君二世昭倉使君三世穆之一世夫人薛君祔以下各如其次四世昭㛮李祔一又李祔二牛氏班四五世穆婦趙祔三麻班五梁班六凡為封十三系曰當天造之初出萬死為元元請命其識見逺矣矧能以文獻為事于斬將搴旗之際此淵源濡染之力非邪觀公旅力方剛百戰中原以開昌運一何盛也雖竒謀偉績莫得而詳迹其孝友于前蕃衍于後亦足以明其無陰禍矣及功既有成蒼髮猶壯幡然謝去以就夫聖賢所謂王天下不與存之樂知所擇哉嗣人復孝友承家耄勤營葬是真能子矣若其文獻之傳則又後人之重任也夫勒諸貞石昭告來裔俾永永無替
