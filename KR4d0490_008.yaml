body:
  text: 勤齊集卷八元蕭㪺撰七言絶句郊行雜咏雨洗終南湧翠螺霽光搖蕩麥翻波行行合得新詩句傳入西家牧豎歌牟麥油油露葉光矮籬風軟菜花香誰家翁媪迎門笑言語無多意甚長禾穗年前一尺盈舉家翹首望西成南山晚禾無十日都向秋霖作耳生長波渺渺麥藏鴉宛若鳧鷖沒浪花行客不知農父樂凝然立耨土如沙桑弧偏稱牧兒操蒿箭盈腰犢鼻牢不鬬近來吹笛好且看仰射阿誰高懸崖古柏倒生根過嶺雲陰走燒痕知是一鞭農事急谷聲傳響到前村廟門土鬼面如蛟斜曳樛枝一手髙極力握蛇猶未得更誇千里見秋毫隔籬笑語自矯柔雞犬間間緑樹稠怪底桐花搖落甚一叢兒子戲千秋原注秋千本名千秋見黃山谷詩乳下豚兒作隊嬉行人為汝亦怡怡莊生政自知魚樂但爾難言與惠施原注賈思協云供食乳下者佳益都長谷道中西山嵐重迫秋深霜風拂晨那可任維良瓠壺行簡酒此意何啻千黃金旭日初升嵐未收西嶺絢爛東巖幽山靈不必歎遭遇向晚大有詩家流乾坤富貴是深秋客子都忘道路愁步障兩山開蜀錦晴空一幕展青油可齊為張東甫賦治生往往迷知足適可為心信善圖秖有治心初不爾直須聖處著工夫五月十七日作片段殘雲魚尾頳夕陽特向竹間明嗷嗷盡歎甘霖少得似尋常愛晚晴席待舉述先訓一自公勤得本真饑餐渴飲任天鈞披裘擁絮關何事八表神游自有人題張華甫經厯古象笏孝養由來百福鍾休徵相報古今同貂冠莫作千錢計指日文通拜侍中即事地卑冬燠耐凋零忘却長楊作雨聲失喜夢回欹枕聽呼童起視月三更積雨琅琅起百憂老來方識子孫愁篋中舊筆關何事脫帽相看也白頭題衛輝驛舍月華如晝蝙蝠飛槐隂滿地空階靜蕭條床笫困河魚誰收病骨官途永題姜君美菊軒子幼雄深太史公姜君雅淡斗南翁不然千丈京塵底誰暇開軒對菊叢友雲軒親友過從不易哉稍加疏數即生猜寧當只與雲為友彼此無心恣往來題路舜卿聽雪軒五音端解使人聾聽雪雖清亦閼聰還有無聲真樂在四時無日不融融四軒修竹玊無塵聽雪寒宵發興新無雪不成尋雪聽聽風聽雨總宜人田舍壚頭睡美時雪花如手幾曽知竹窗明發傳新語壓倒春蟲亂撲詩讀是非針客忮何嘗怨飄瓦身寒只合襲重裘諄諄自反垂明訓君子終身固有憂九日東臯亭山光葱蒨玉無瑕逺水熒煌帶暮霞便是淵明舒嘯地也容閒客醉黃花粹翁語别詩以言贈詩成㸃檢生驕氣食飽游行有惰容座右自針今贈子儒先曾戒晉人風夜雨杪秋暮雨不能晴簷下玊簮多葉生滴滴通宵成底事不聞鼠輩閙縱橫窗前花盛開窗前草木開來久今日才看十一花此去定應成末減盛衰若此亦堪嗟讀劉宣慰春日雜詩十首新詩義幾般大都細說在家歡常年豈為無花柳莫是心閒較好看重八日入城復禮文振季正留飲過申得别次韋曲已暮愁隂初霽月初弦滿意秋風灑靜便午醉留連情爛漫曉來行役寂寥邊應召早行過盤豆熙熙穰穰利名窟踽踽凉凉仁義途自笑區區何為者趂凉日日五更初隱隱林廬古道傍人云此店半䦩鄉家家雞犬睡方熟我乃匆匆趂曉凉髙持正山水卷原注中山吳巨濟筆也六合雲同雪欲飛一襟清興浩然歸還山此後休輕出徒有紛紛捷徑譏題蘇君政山水卷倦游客子思洗腆樂山妙筆通真靈秋風一夕故山夢明發馬首秦東亭劉宣慰背瘡後為壽古來五福數康寧甚喜聞君藥己停病裏移心應得法定從好德享修齡或以待詔見呼者僻性難裁苦厭喧故攜書册讀荒村鉛黃本擬分魚魯我自無心金馬門同字韻和飛卿兄如君古拙未多逢㸃檢賔朋只我同不向商巖尋四皓定應崩迫一生中張希賢别業季鷹小築便幽竒乘興而來足自怡兄弟交游半天下祇應無壁寫新詩奉答伯克子母錢多負友朋夙宵慚恨苦相仍從知詩債愆尤小庶望寬慈與免徵皇穹命我為人者斫喪於今僅幾存况此雲山公共物敢容小智著籬藩即事疊巘葱蘢橫爽氣嬌鶯圓滑弄清音道人不著閒聲色底事寧須却入心雪江歸棹髙人興盡有餘清舟子凌兢噤不鳴想得到家過夜半一樽濁酒肯同傾原注嘆同憂不能同樂者題何仲器靜安堂童稚相看到白頭知君無我最為尤衡門晝掩南窗坐除却題詩百不求潁川貞女弱女娟娟未有行室家不足竟忘生三生傳此豈徒爾士子首途當作程男子才良女子貞天經地義聖賢明三山作傳寧無意要使人人此道行有感壞墻鬬鼠氣如牛熏灌停機自作讐食我囷倉不嗔汝壞人圖籍最堪憂鳯麟未省知生處蟣蝨何嘗見死時造物相違每如此區區人力果何施以桄榔杖為子誠夀多節烏頭勝裹金文章可玩力堪任不如往作吾兄壽免動炎荒食麵心原注是歲艱食瑞麥休因瑞麥鬬詩工指有枝駢理亦同聖代災祥都不論只憑人瑞作年豐講晝寢章因以自警古以晏安方鴆毒痛懲隂濁易施行果憑雷烈風飛勇赤日中天萬國明有懷寬甫翠竹黃花過小園碧山江樹正當門虛庭鏡靜苔花滿唯缺幽人屐齒痕劉參政生日避於蒙溪春來多雨困衰疾河魚蹇膝相因仍無由往為君侯祝五福應隨德日增才過清明霽景遲夀星光彩照蒙溪誰能得似君難老直見仙人跨紫霓求鹿脯寄李侯雞豬魚鴨苦生風牛禁方嚴羊熱中也為病妻求鹿脯要知豈願學顔公劉蕡祠斷刻縱橫古木隂趨庭再拜涕霑襟後王肯鑒前車覆猶慰千年九死心别後休隨事勢嘆奫淪明理元來即要津我自有頭回轉得不應索異待他人讀莊子含哺而游鼓腹熙斯言本只說無為豈知引起無窮欲直到肉林并酒池夀宜堂北堂夀母君能養孫子室家無不宜一探本原為善頌奈何人笑合題詩送李經厯赴江東憲司長安憲幕忽三年沈靜詳明萬口傳好去宣城攄素蘊又逢同氣又資遷東風花栁正清明忍見慈親送子行烟水迢迢二千里望雲回首不勝情江東凋瘵已還舒道路豺狼即漸除堂上若聞應更喜便須勇敢莫躊躇默齊德行民孚可不言事親為學豈當然茍非審問兼明辨安得躬行免厥愆題鄧士要行齊懇懇前修說踐形人生所貴不虛生直施超海挾山力躍出功名富貴坑塵務經營負夙心誤君千里辱相尋躬行别後多新得為警疏愚寄好音題白君悼硯推仁及物古人能薄俗紛紛未省曽今日因君吟悼硯使人多愧剡溪藤君家石友研磨久快筆如風不可當已破何須留故事乞來吾欲礪干將卷首文竒足自賢卷中詩好總堪傳憑君莫嘆吟窗硯失手風雲最可憐題楊無已字說為學先須識大同若為殊别萬無窮見賢能察相懸處此是思齊第一功義利昭然作兩途深知篤好半賢愚其間相去不容髮舍已從人四字符耆英圖為監憲容齊公賦繆政堅持諫輔愁西師淪覆慟宸旒圖形妙覺諸元老有酒應銷為國憂題山水圖岱宗一覽小天下川上形容道體深聖學何嘗廢山水披圖頓覺啓靈襟題清音圖百折流泉萬疊山宛然琴意在冰紈古音不入秦箏耳歸去巖阿和考槃鳩谷谷鳴鳩緑樹中喚晴喚雨日無空誰云此鳥生來拙却是於人有大功寬甫庭中今年多隂菊事晚相對共懷遲暮傷只有幽人初不爾待渠開日是重陽耿老賙恤詩卷博施難周聖未怡人人能恤庶無遺忽思去歲東州道糴米晨炊嘆不時三月梅花塵封吟硯動經時百紫千紅不入思可是萬堆濃緑裹嬌黃幾㸃費人詩只道濃春醉海棠也來閒處發幽光常年虐雪叨風裏今對輕雲暖日香微香淡淡日遲遲冶蝶游蜂總不知畢竟為花那用爾幽人相對儘相宜苦雨顛風夜夜寒此花原自耐摧殘世間萬事乘除裏妨却騎牛醉牡丹忠宣公葬後大雪呈嗣侯彥瞻輀軒至止旱塵昏斬版俄驚玉海翻應是天心表清白故將縞素裹郊原生有勳庸沒有知為霖真合似當時只應田父謳歌處重感君侯罔極思春雪曉看萬象變瓊瑶回首風吹日炙銷可是青紅太相迫不容潔白暫終朝送彭丈東歸驚風已折鶺鴒枝又到諸郎埋玉時忽憶西河尊酒夜龍鍾東去淚如絲送張祐臣得得清篇為起豫飄飄髙氣在雲衢錦囊又有游梁賦為問舟軒安穩無送楊仁卿病中時幸數相過晤語常慳醉語多又爾匆匆成逺别經旬作惡奈余何阡表刋來衆已推聖門語孝有成規顯揚直待傳千古他日重看第二碑舍生取義豈論貧一士能令氣必伸敢嘆悠悠非族類如君尚有白頭新送從善龍尾由來不世資選鋒危及困支離暮年方寸羣疑塞抵頂微言復幾時送王叔衡阿衡我愧未論交籍籍親知衆口褒且道躬耕官滿日去人何啻九牛毛謝竹荒齊觸目但蓬蒿能致此君非俗交合著新詩答清貺一軒晴日看風梢簡飛卿從善桑如翠葆椹如餳大麥生仁豆角成秣馬仍多花苜蓿肯來相對話平生簡何淵甫曽約終南最上層重陽携酒泛金英比年屬有期功慘今歲能無續舊盟漫學途中曳尾龜不堪多病忍長饑何侯有粟無從貸憑仗新詩往問之秋江送客圖憂雨憂風亦等閒若為沙岸久盤桓關情别有無聲句憶著分明下筆難生朝有感歲歲今朝誨諭深一回記憶一霑襟人情底是真誠處只有耶娘愛子心全家語笑記喧闐應為雙親有所憐昔是嬌兒今白首此生無復似當年光隂最好悔空過歲晚徒成感痛多安得此身常幼稚却教翁媼久婆娑人年老大忌童心我獨哀吟孺慕深生死有常安得諱兒從父母喜何任都為當時歡愛極而今哀苦却無窮迂疏何以慰泉下只有臨深履薄功奉告娛親七字符趨時竭力莫求餘當知父母看兒喜妻子孫曽總不如自警天道生生日日新何嘗事外役精神蘧廬一託都能幾兩字將迎老却人晨起連年昏嫁苦相尋想見蕭蕭雪滿簮身世相忘吾豈敢老來看鏡自無心四皓圖漢興四海悉來臣所不能招獨四人平昔若無髙仰義憑誰救得斁彝倫草蟲鳴暑號寒猶有取穿花㸃水復何功齧桑害物尤為甚大化都均長養中哭殤女褦襶經旬始出城怪來問我苦丁寧匆匆五日冥然臥便隔終天不復形日來侍食省衣裳一月俄成七月殤嬌小未能知自愛枉將性命託耶娘攻虛邪勝莫如何災怪從生理則那應是剛柔成反易百年慙痛淚滂沱兄弟由來手足情弟號兄哭不堪聽哭聲有盡哀無盡我亦神游到九冥團頭弟妹哭無休洶洶情瀾不我由起欲撫摩云得得浩然聲淚莫能收薾然哭罷似忘形恍見窗間自寫名莫道情鍾惟我輩何人父子不鍾情至性能憂病母孱煮湯合藥戒多餐誰期老樹翻全活橫著風霜殞稚蘭讀得班姬女戒篇略通一二未精研小心長恐耶娘怒不待知書自可憐針艾無痕耳未穿却應惟汝得歸全恩深責重寧無謂不枉兢兢十四年為絺為綌豈曽厭治繭治絲察米鹽世上芬華都未識敢論富壽得雙兼畏儉慈祥慧且和歲時助奠益無訛若為不得終天命應是耶娘積釁多精神灼灼鏡奩邊風骨亭亭只眼前不記黃壚成異物猶期白日結飛烟原注吳王小女事見白傅詩自注年來多病不禁愁何物人間是帝休覽鏡忽焉成太息澘然涕淚應時流原注帝休木名主不愁見本草人云相業與醫方能致生民不天傷自悔半生工畫餅不知精力事炎黃堂前手植射干花著子盈房汝已化平來歲花開應更大繞叢凖擬百長嗟秋雨琅琅玉線垂忘情看雨復深思數漚起滅隨黃潦亦有委蛇得許時哭劉參政去秋臥疾再經時豈料俄成永别期不見迎門笑相迓人間寧有石腸兒詞鵲橋仙壽詞萬金寶劑三山仙島祝康寧壽考似君全福幾人能真不是天公草草綵衣膝下清歌雪杪莫厭金荷倒祇應龜鶴羡長年八千歲靈椿未老太常引壽詞天家崇德報元功稽盛典極追隆美諡亞三公更大國新開魏封夫人配德淵深玉粹麟趾見清風恰恰夀筵逢想醉德多於酒醲浣溪紗張詳議八十壽紅藥香中敞壽筵一叢蘭玉拜尊前曽孫繞膝慶髙年白髮弟兄真樂事雪溪孝友即家傳人生佳處只君全望月娑羅門引叔經宣慰夀城南佳處問誰人得數登臨看公鐘鼎何心鳯咮東邊小築桃李作髙林道詩書教子絶勝黃金千年尚禽肯隨世漫浮沈好在傳家棠樹培壅清隂年髙德劭似一日春光一日深青鏡裏白髮休侵
