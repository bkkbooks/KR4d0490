body:
  text: 勤齋集卷五元蕭㪺撰五言古詩偶成古鏡徹肝膽嫫母難為顔桂枝苦樛結直士不可攀小草有逺志結根在深山寄謝荷蓧翁聊放斤斸閒錢屯田府送滏陽趙天麒歸養之子來關西尊親留山東眷戀豈不勞五鼎志未充幸從兩賢游獲聆古人風内外别重輕學問道孝忠中宵膝下夢明發歸興濃寄聲為徴言逌然發我容覿面或不親千里風期同利欲劇膠漆孰能奮髙蹤菽水可盡歡况乃滫瀡豐君子愛方寸勲業雲浮空任重欲道逺期爾善初終贈張竒童聖學久不作美士㡬空老藝文聲利間身心若為好造物或靳之寧馨焉用早神駒萬里氣整轡遵大道送熈正妻兄宣撫順元開歲屬凝沍幽潜未昭蘇念君夷徼行旅懷曷由舒雖為君家甥情好實天屬傷哉異出處㑹逺别恒速負痾抵京闕方欣暫留連王事不可緩遑恤道路捐生離古云悲而况今若此虚名來實患乃復先哲恥天家我何補逺人予能懷遹觀惠永寧順元與之偕過家語妻子若箇青山深洪恩釋病翼終焉渺雲林寄㢘承㫖嗟余晚聞道寡昧莫與儔學農且無成而敢玷士流下問脫有人披簡副所求何以佐司成將貽君子羞劉君寳植檜珠璣飾翠葢季孟松柏間雨露長新枝斤斧困舊山傷彼菁莪詩千載不復還君其保玉體育材濟時艱題伯時馬圗茂陵好竒才未㡬輙殺之爰其御馬際乃得休屠兒社稷屬四臣翕叔獨無疵多岐果䘮真不若求天資周謙夫職貢吐綬雞因為題賦以送南山有珍禽向日吐竒彩紛綸衆色具煥爛羣目駭須臾復斂閟榮耀不常在如何組綬者屬意異真宰蔡道者歸江陵原注月間月湖之弟道人索我詩不知將底用但云難㑹面明發適雲夢水月本自閒何乃爾倥偬相見只論心是可詩以送小女小女年十三風骨頗自清隨意作粧束便有林下情見爺困垂頭佇立思屏營飄然過我去颯爾清風生四月八日張閏甫林居燕集明日寄謝芳節聿云邁之子有嘉招杜曲多勝跡兹焉謝紛囂前山羅峻屛後山鬱岧嶤廻潭䕃古木溪流㵼青瑶美樾席長筵穆穆來清飇即此冲襟適而况豐酒殽新荷動游魚髙栁初鳴蜩竹林有官守蛙吹無征徭坐久窮源泉珠琲累累跳波神勿爾劇我豈夫婦蕭攀躋出林杪頓覺人境超翩翩六七子亭亭各清標晤言雜善謔既醉仍相邀生平丘壑姿㤀機狎漁樵爭席猶未肯勉矣鉏吾驕歸途念勤厚報以新詩謡新嘉議壽八十發袠覽貞辭驩然失衰疾藹藹慈祥氣馥馥芝蘭室聖代孝治源先生醫國術考槃且莫歌尚父鷹揚日巫賢昔有陳千古配祖乙願言告猷裕於以贊勤恤髙蹤詎長往蘭芽復秀出善醫與善計咸曰今鮮匹勉矣行所聞南董方佇筆四月一日小酌興慶池上畸亭翁命以江上被花惱不徹分韻賦詩五言得惱字朱明受謝初未厭青春好鶯聲何處來喚我東城道瑞靄鬰嘉林光風汎瑶草逍遥池館清爛漫芳樽倒滄波滌塵慮大地入幽討聫翩六七子南金照和寳宗匠斫雲公健筆摛華藻雄辭撃包蒙溟漲吞潢潦思風吹言泉無復為詩惱竒險破鬼幽突兀奪天造人生慳百歲快意豈常保今者不盡歡誰與傾懷抱牛毛身外慮一醉徑可掃君看秉燭詩莫促歸騘早寄題任東卿訥庵行繇言大難言以難為訒口給見屢憎維訥於仁近元聖詎吾欺千古昭明訓慥慥任隠君勇退中流迅衡茅扁訥庵身道相與殉作歌豈小補儇佞亦思奮相望邈山川十載勞芳訊披雲杳無期因風致多問孝顯堂宗周孝友家千載慶未已孝顯克繼序詠歌已盈耳榮親在騰芳兼善貴成已尚口或貽羞庭訓亮及此㑹見德星褒式表髙陽里孝安堂美哉風化墟周南有遺化賢哉石氏母髙節等嵩華嫠居撫二稚誓言保桑柘夜績手拮据晝哭嗌為嗄力貧資兒學食荼謂如蔗天運有窮通流光迫晨夜之子悉能賢讀書事耕稼滑甘為母欲和柔以之藉兩婦饋堂上九孫戲堂下熈熈一堂春無冬亦無夏户册即實録鹿泉豈褒借郕侯言孝養致敬安未暇乃今所皆能黨里旣驚詫願言篤有終川流貴無舍安庭實經歴損齋靈臺湛晴空物欲劇奔騖損人以復天千聖同一趣主一欲斯寡無我又奚怒進减及其盈三德又殊賦恭惟魯叟嘆始覺向長固欹器戒持盈而何廢挹注寥寥向千載莾莾榛此路奪攘饜巳私覆溢昧侯度三肅齋中人愛之莫可助夏夜有懷畸亭翁隣笛叫明月懷人割中腸怳忽欲命駕猶期揖容光丘山與華屋夢斷海生桑臨風一浩歎辭短哀甚長送甥翼漢史之行歲晏氷雪稠路永山嶻嶭奉檄子當行我懷愁觸撥爾行見我姊母子笑喧聒我今乃無母念之心若割牧民如牧羊凡百愼笞喝一朝或鋌走何以免鞭撻况彼亡命徒尤爾費檢括王家豈乏此僥倖庻可遏汝往善為之勿或致乖刺人生少合幷眞若弦與筈今者不盡言惓惓何由逹衣莫求鮮麗食莫厭疏糲失志毋刺促得意毋軒豁百年憂樂半天運有旋斡人或昧此機患至如俯掇斯言乆當喻勿遽謂迂闊因風數寄聲慰此長饑渴送韓德剛赴鞏府辟學巳有淵源行已寡悔尤殊才不久屈同氣還相求髙歩豈易量長吟方欲愁儒冠未策勲行當換兠鍪題白逸民行齋堂堂潁陽侯所尚存諸外干禄與問行夫子悉正對逸民負逸氣行齋見圖繪何以忠告之願守書紳戒寄石仲璋尚書英英大司馬雲巾嘗拜辱及聞即明陟未克馳賀牘侯公有嚴命烏敢遽徃復因君致多謝鄭璞元非玉臨流賦詩圖負痾觸隆曦殿屎伏嚴景空然蔑補報索米恒耿耿邈矣乘化翁髙躅孰可並繪事一起予終曉不能靜送公邁冬温苦為癘長幼無孑遺百憂攪中腸况聞子言離人生事如髮此别歸何時留贈華佗帖重感懷古思聞古大學功一皆用其極必具聖賢質又盡平生力雖云莫我知或有不豫色遺澤被無窮豈在髙官職殷勤重來别是夕當元夜村鼓敗人思作詩良未暇惄焉心如擣孤燈耿書架猶多未見書子去何由借送趙彦卿新陽敷德澤萬物氣方吐友生事行役觸撥别離苦向也惠安政到今民歌舞調官復何之懸知又南土何當占一㕓爰以得我所題方氏得雄卷聞君亦齊産未面心已親况脫貴驕累澹然守吾真徳人豈無後宛焉掌珠新要當成大器之無奚足陳送潘獻臣冰雪滿天地人行背南鴻中臺有嘉招云胡太怱怱枉駕索贈言常談若為功喧寂從兹異尊酒何人同送王君道周詩三百篇元聖垂世楷勸懲發眞心炳炳無幷猥云何百代下隨意變蕕茝澆醇而斵觚豈弟生塊磊温柔敦厚教於斯果安在千唱復萬和喧豗劇雷駭鼓舞行橫騖徼倖死不悔其流生禍然夫豈詩之罪雍翁大雅人談經今永罷哲嗣忽壯遊訪舊淚欲灑驅車向金臺寜不弔郭隗頗聞古昔言禮義譬醯醢人有懐昏姻萬事悉瓦解外内相重輕窮通奚足痗思後貴愼初愚言智所采送李之晦疾風起中秋吹此長恨端友生别我行留詩感陳根吾甥君姨弟實維得齋孫與子每偕來視友知子賢慨焉念存沒倍益離别酸六卿職阜成其屬諒為難隴憲愼所辟子豈富貴牽老親困三鼎清俸資餘泉神京桂玉愁難發㢘士歎願言保方寸勿為橫流昏送楊仁傑與子相為甥倐忽四十年大化不停冶稚齒成華顛囘首感存殁相看兩凄然我病卧衡門君行戍極邉一别一衰老人堪幾離筵此行亦良苦冰雪滿山川君恩㑹須報金節煌煌懸我非贈言者情話當一宣羌渾風沙地尚愼食與眠世途足機穽人心有戈鋋象有齒而焚膏以明自煎忘言意愈適不飲體自便孫武善言兵仁義行機權為學無早晏力行以為先刮目看豹變何時復言旋送馬季卿之子征車發首路麗山隂政爾盍簮樂坐使增悲吟嚴君阻定省東南控喉襟縹緲望白雲孺慕不自任游子半月程慈闈萬里心長亭一巵酒此意江海深新凉燈火盟何當重來㝷霅城錢氏畫折枝梨花大谷有嘉種飣坐冠榛栗芳甘滌煩毒養賢代鼎食隂精蓄造化一發移歲律緗帔麗朝霞香雲藹晴雪畫史誰折贈繁枝冩生質云何以春華而乃廢秋實衰疾固多感撫卷三歎息墨竹物態有枯菀桃李隨春殘此君異其禀抱節老嵗寒風雪霜露雨榮悴亦變遷復不如墨君長年鬱盤盤天地㑹有壞矧伊寜獨完但能存此詩此竹無窮年贈鏡機子夀卿明敏資丹青聊適意蠟屐與揮鍜未覺累髙致妙處固有在形似抑其次君看造化筆衮衮生萬彚擇術古所慎藝成當撥置螢窓積舊書家世要卿記送石郎中原注仲温以公事之京師人謂其有長往之意故以拙惡釋之杪春渴時雨沈憂萃中襟新知復言别作惡那能任世故巧相違滔滔古猶今行止貴時中清和非所欽二頃詎可無倦翼知舊林西周厥田美溪山極清深他日此優游胡然有遐心寄上薛郎中正之長安有賤子狷介仍木訥倔彊背時利曾不厭糟麧為學少師承窮年恒矻矻平生子陳子蓬心資剪伐時亦接杯酒清晤坐深樾每日言薛公於余比蛩蟨氣岸與我同言議更英發法當正王度玉立侍金闕於今卧衡門仰空書咄咄間以筆墨戱風雷入撞捽髙出溟涬上幽入造化窟岐陽匪螭蟠大鯨偃溟渤爾能掃其門金丹換凡骨塵縁上繳繞歲月坐飄忽畸亭巳飛仙自分黃埃沒今晨辱嚴命一聼凛毛髮雲霧不易披川塗阻超越三薰裁短章式代下風謁他時不棄擲庶得補黥刖趙左丞出示其先相君挽歌詞命追賦忽忽經天日滔滔逝川水哀哀蓼莪痛愴愴霜露始世故安可窮危機諒難履蕭蕭白楊路千古同一軌雖則古所同天性曷能巳云何慰永慕令德播清美聫句雪夜聫句王城何喧闐人事苦紛糾飛卿登髙期五載屢歎失重九㪺及兹今日游乃陪諸君後文振山雲釀層隂急雪暗林藪士光龍公詫竒巧六出碎瓊玖從善何人醉擁貂有客行印拇㪺豐穰眞有兆潤澤到南畆士光糢糊增丘陵浩蕩匿瑕㻈從善狂笑山隂興清讓㶚陵叟士光小集慰情親危登怯衰朽飛卿古洞春意融髙岸雲氣厚文振短日阻竒觀長檠破深黝㪺留連蘭友情瀲灔瑶觴酒文振爐烟輪囷上梅馥斷續有士光密竹聼繁聲前山應白首文振寒烏巳定棲饑虎時一吼㪺初謀一日歡定作再夕久從善歌杜感伶俜維駒舒懮受獻酬忘賓主辨析慎然否㪺名談亦間發疑義得詳扣從善既趨正大途肯使聲利誘㪺齋心樂一簞折腰鄙五斗士光固非長夜荒庻免具眼醜文振餘波及聨句思苦心欲嘔從善安得言湧泉但覺箝在口望月將轉申聼雞巳過丑今夕喜盍簪明朝惜分手何當追雅集村村有花柳並㪺七言古詩立春後五日中夜始雪抵曉無寐擬歐公在潁詩律奉寄從善文振寛甫舜舉諸友好且約同賦夢覺初聞掺窻紙拊几止之疑䑕子斯須復作巳驚心開門見雪可勝喜鴻濛天地還一氣浩蕩洗空方未巳墻隅先集己成堆平地半融應及指囬風灑面不鳴樹落日甘寒忽無滓泠然内熱頓蘇醒兩骭相圍還擁被冥搜未就興氲氲時一窺牖恐中止今年夏旱失西成不雪來麰復何恃况兹羊馬暴終冬官縱不訶天聼邇豐年作兆尚来兹癘氣且先銷眼底人生苟活即多幸敢歎後時傷巳死終然墮牀成一笑敢議昔賢折屐齒天王所樂在得賢賢相樂在萬物理但得康寧免凍餒野夫之樂無加此昨承從善文振寛甫同賦雪詩復次韻奉謝新詩百讀毛生紙竒特今誰若三子文章有神來有兆怪底頻占烏鵲喜鏗鍧金石隱四壁幾欲賡載還復己可憐操斧對般倕愧汗淋漓仍血指憶昨冬温惱貧病藥裹屢空煎及滓浩然一雪惠無邉吾與萬生均所被熱中為祟得少間笑傲歌謡遂無止那知巳霽變恒燠靣腫頭瘍復誰恃姚君神交若同氣室雖逺予人則邇珍丸絡繹走急難起余長㓜黃壚底人言昏宦情欲始兩者幸無灰巳死生子但如田舍兒自可囂囂沒吾齒春光爛漫百鳥語我獨愁思紛不理伸眉一笑豈徒然微詩之力不及此送蘇德威經歴君不見丹山之鳥曰鳳皇九苞竒質聲鏘鏘平生夢想不可見飛來四海生輝光蘇君之德五色章簿領棲遲聊晦藏胷中一塌羲皇地寒暑迭代無炎凉俶裝北首烏延道舉酒酌君君盡觴明日相望天一方梁山萬疊青茫茫勉都幹權君并序都幹權君明醫相之術相與浮江淮握手逾月言論豪放世罕識之者亦隱於技耳賦詩以勉之長安城中豪俊林錦韉玉勒馳駸駸入門朱粉誇妙麗出門青紫爭浮沉東家問醫西問相君獨燕坐鈎其深氷眸一睨窮逹判刀劑不許寒暑侵長安城外天隂隂行人駐馬為悲吟髙墳崔嵬葬白骨安得不死腰黃金世間萬事何足恃禍福倚伏常相㝷渠儂自愚君自巧誰肯一笑忘華簪蜀人賣卜嚴君平垂簾閉肆窮古今逢人但説忠與孝自有逹者能知音察形察色君所解直須洞燭賢愚心屈伸壽夭亦命爾公平正直神所欽送姚伯玉赴闕皇穹大德唯生生民中絶命百厲并聖神教之若其恒多寡裒益一於平維古禆化今自營玉文絶出天與能六籍羣方粲日星一以御萬成有經旁蒐品物入擣烹廓摧氛翳通眞靈芳譽籍籍騰紫清雲駕渺渺翩上征視色祝由君自精舍粱肉其將何慿以身喻國庻易聆安得憂其所可矜去矣壽域開八紘送焦君美從單帥撫西南夷天書夜下雷風馳大賢暫屈安坤維坤維小域羅羅斯從古以降羈縻之倔强則討懷則綏往將膏澤摩瘡痍懸知老稚相扶擕跪陳牛酒語嗢咿天王提封西南陲孰敢妄意論雄雌曩時波斯利吾貲發摘邉釁生瑕疵貨自地出何惜為但恐孫子成係累黔驢一鳴計巳卑堂堂何足勞王師自甘霜雹摧枯萎豈意腐朽含華滋呼舞拜荷天子慈從此鼓腹春熈熈英髦衮衮隨旌麾盡道焦子尤瓌竒事君行已君自知臨歧把臂夫何辭贈之以棗副以龜雙親素髪蕭蕭垂可堪魂夢飛天涯寄子誠從善旱饑荐作興民譌流離孰得安其家癡頑堅卧對丘壟宴坐况復書盈車食無精粗皆天物能致不死皆可誇玉盤珍羞錯海陸生類有極饞無涯細糠火餠入健啖嚼成快馬行深沙美如冠玉未屬厭乃今放飯寜非奢雨餘春韭脆無滓闌干苜蓿烹柔嘉大庭遺經可久食聖神德澤何其遐既不能為鳥來儀聖明世又不能為獸屹爾撞憸邪素餐草木且深媿敢論索米遊京華寄飛卿枉山枉水昔未到乃今思之如故園德人在彼忽經歳神馬想亦終南奔一尉東南二千里蹣跚勃窣何如耳每同陶鄭對壺觴矯首長歌沅有芷蹇予蹤跡更堪論碎却田家老瓦盆三雛索莫陪枯衲藥褁猶然不離身天生我材既樗散壽夭榮枯何足筭安得奮飛在君傍一笑夜語雞聲斷紀夢夢中父疾自漱裳呼母不見僮強梁走歸感畏趨侍傍覆面起席驅蠅忙扶父藉褥蠅愈夥拂之不飛身下多承命掃將飼羣豕蘧然空有淚滂沱夀某母華年秉義不樹蘐耄期雍容蘭五蕃人皆歆羡五福備那究一德通乾坤誰思彤管與細論凛然可使薄俗敦君不見闗雎化行出麟趾義生禮作今其始康樂堂為韓氏題天家為羅亦為媒大開明堂致羣才小臣踈鄙胡為哉海角松楸杳何許霜露明粢薦無所方寸晨昏割酸楚百憂耿耿新詩披羡君康樂勤夢思增余卒歳風秓悲寄答王眞卿贈草書歌并棕竹杖多君兩蜀獨鷹揚詩印髙提四十霜應住浣花濯錦傍飲芳食菲錦為腸天風飛堕雲錦章字字奪目騰光芒中有龍蛟夭矯長宛如樂譜含宫商野夫不覺喜欲狂快字凌紙雲烟翔一笑大勝濡首張劒舞何待公孫娘奈何筆墨成膏肓為韓氏題夀康堂韓母吾知有隂德神理昭然斯可質不爾康彊富貴身誰能三萬三千日公侯衮衮更何如晝錦寜馨奉起居羣表兩分金虎節東床吏隱猶銀魚直使黄金髙北斗欲似君家還得否孫曾矯笑滿階庭母子熈熈俱白首烹龍為炙玉為漿銀屛繡几凝清香緩舞安歌千萬壽一堂和氣何慈祥天下此歡眞第一天長地久那終極多君致樂能及時人間何限枯魚悲陳受之舟虛亭洛人陳天禄受之與物無競恒熈怡其中洞然信靡疑逆旅代耕聊逶迤一㕓秦東亭北陲有屋深長如穹龜左右花竹環窻扉延我侯生同宴嬉扁以舟虛僉曰宜韓侯因為求箴規維木中虛可乘危載以百物窮天涯維人中虛可從師學焉眞與賢哲期雖有好者乏所資若子政合勤於斯朅來徴文題以辭往取作者相嘲嗤謝李居仁仲堅昆季贈象管君不見漢晋已降文物亨麟角象齒封管城君不見六朝湘東平巨盗特以黃中表忠孝黼藻皇猷推有唐雲章煥發惟文皇名家奕葉驚海外解驅犀象惟歐陽自兹千載神物藏後來繼之有元章我生苦後用葦竹坐思象管成膏肓仙李塤箎辭俱美子文為贈紋如綺端圓瑩滑尺許爾便覺千鈞入吾指變化縱横若有神方圓囘合皆天眞世論輕便傳逸少千載恍惚空疑人人生尤物翻成累聖哲丁寜憂䘮志阿堅何日復歸來據德依仁共從事子明劉弟奉使南行兼促乃兄歸裝新正肇淑氣芳氣殊菀結星郎佩明教候禳走江浙寳奩香一瓣懇為蒼生爇力疾賦民勞長歌為子别聞佛有神力慈愛尤所切可能獷為良於焉息喋血可能土為金於焉息饕餮癡者可能慧恚者可能悅可能貞不淫可能政無譎國祚永無疆斯民皆耄耋神功政可運夢卜勞濬哲兹任諒非輕行矣致禋㓗戒飭况有命勉哉無玷缺秋風蕭颯動江臯念子鴻雁歸飛勞團圞閉户學餔糟儻來富貴眞鴻毛
