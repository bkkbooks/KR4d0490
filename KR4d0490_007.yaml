body:
  text: 勤齊集卷七元蕭㪺撰五言絶句陶淵明陶翁千載人頗為清淡纍請聽絃上聲何害琴中意節婦匹婦固其守竹素千古華長樂癡老人榮耀何足誇感事曉窗方撮蚤么蟲何來集寃死復誰辜吾黨慎出入菊花學陶本無心中庭數叢菊行止有時義吾豈同草木桃溪泛舟清溪泛落花不受纖塵涴漾舟得新詩孤唱誰與和西臯晚眺倚杖立江臯放神超八極不覺歸鳥盡萬象入暝色溪亭午憩亭上曲肱叟有道出皇墳舒可彌六合斂之不盈分葵堤晚步葵生被橫堤花時日來往應恐秋節至零落同草莽柳塘垂釣游魚戲柳隂洋洋足生意綸竿豈不仁自是渠貪餌紙扇南薰時未至先生豈無功用舍非關己何傷篋笥中送蔡道者歸江陵五湖吞天寬碧澗日千里印月無二影到海同一水過甘墅有扈侮五行夏王致天罰豈知千載後幻水三綱沒雜詩春工無適莫是處碧芊綿底事沙如雪秪供鷗鷺眠敗絮蝨無數晴窗蠅有聲垂蛛緣底事應報薺苗生病中熱病病欲死一窗風雨聲人生何比數天地有生成四勿齊動止悉吾心端淫皆此目為君舉一隅更取箕範讀送王君冕觀徹萬化原學之本斯識嵩髙與蒸民罔匪先論德清水出芙蕖不受纎塵㸃定能完璧歸四勿恆自檢功成名乃遂禹稷顔孟同彼哉日求仕何名復何功送同周道甥當省外祖意善體慈親徑欲傳家學終身學聖人踰梁下豳谷登天復入淵山深疑欲雨水淡欲生煙桑蕾蟾睛出天光卵色明芳時良友去一寸百憂生兒時拜程翁今猶記其處無計得隨君有夢隨君去匡時忌太孤學古不妨僻它日魏陽元成此外家宅林深嘯夔魖月黑號兕虎念我行邁人道途亦良苦拋却惠文冠幽居屏塵迹君去少來人老苔堆徑碧齊民不逮中或者傷於過望望山中人臨風歌楚些運斤雖入神良質竟無人送子且何言春風燕麥新歸路驊騮喜香風入四蹄直須預相報逺迓驛亭西秋江送客圖交臂語未盡風帆可奈何天長目力短離恨滿滄波六言絶句村樂圖原注唐人巾服醉騎牛歸童子牽而食物畫史筆端有口物情大抵深窺詩翁醉即成寐孺子不知飽時虎溪圖兩說充盈宇宙羲堯反屬澆訛向問金衣公子在傍熟視如何楚江清曉圖沙市人家未起何從得此江天定與阿章瓜葛筆頭爾許風煙長卿老友命題壽母詩撫卷仰君壽母風枝動我悲吟報得餔糜深意勉哉焜耀來今原注古樂府他家但願富貴賤妾與君共餔糜上用滄浪天故下為黃口小兒玲瓏石日月騰光六合千巖細大皆通聞道主人方寸政如此石玲瓏省齊大賢所言三耳吾輩當省幾何去之急如去疾終身弗靈尚多那得絶踏脫繫彼哉養疾徇生為問深思清夜幾人熟睡天明日損齊克已必從難者期於淨盡無餘兹乃聖門實學先須時習工夫往聖繼天立極維兹禮樂政刑割衮縱禆邪幅終然有稱無星逺嶼歸樵圖目極空山野水魂消落日長途爾許荒閒寂寞可堪都屬樵夫雪霽早行圖狠暑薰心屬耳何繇夢此清涼且袖師文妙㫖留看雪月交光孫大方家山歸夢圖覺夢天然符契多君靈府能虛山木方萌寸蘖牛羊政要驅除聞山鳥知是何年子母至今猶爾餘哀我亦何心聽汝有兒亦未歸來送趙彥卿宰惠安龍節日陪淑問不為掊克謀身此去泉人應道定能字我疲民仕優所貴能學公退莫負寒釭祗應有長安夢時一到洛陽江海道爰周九㝢南金應凜四知若見臥龍耕者為言出仕明時題清白圖三年憲幕長安咸讓順卿清白爰託斯圖示戒子孫永寶無斁簡子清白著稱敬容賄而敗業誠知嗣守之難罔曰矢詩稠疊南巷琴阮圖誰謂南巷老子遣懷猶有桐孫試舉淵明故事主人一笑忘言常笑仲容創物只如渠輩清談政爾雲門雅奏阿童且抱歸庵里社虎狼吞噬公私星火鞭笞得似庵中麋鹿終朝太古熙熙
