body:
  text: 勤齋集卷一元蕭㪺撰序五老堂序五老堂者威寧張侯時舉暨其弟時中時獻為其父母世母叔父叔母而作也以五親者皆享眉壽而同居故名之蓋時舉父詳議君壽八十有七母薛君八十有四世母王君八十有三叔父知事君八十有四叔母董君七十有六年雖皆老而視聽聰瞭步履康強知事君雖嬰末疾而精明不衰飲食如壯者五親者食于斯飲于斯燕笑語于斯熙怡雍穆日復日焉不知身之老也張氏繇祖萬户君之事曽叔祖隱君考監軍府君之事父兄詳議知事兩君之事祖父母父母皆盡愛盡敬故時舉輩遵守儀矩愛敬二父三母一無異焉而五親者平生無一言之相齟齬尤人之最難也易曰積善之家必有餘慶即五君之壽考康寧而觀之則所積善不善可知已天道不僣寧不信哉時舉屬余敘之將求當世君子樂道人之善者歌詠之以悅其親且垂法後裔蓋當監軍府君不忘文儒家法雖軍旅中圖書不廢而詳議君生而悅學終日把玩詩卷字畫欣然忘晷而凡世之聲色異端雜學一不經目夫子之事親茍可以悅心志娛耳目咸得為之弄雛戲斑皆是也故不能拒不知余之文能使令尊君一解頤否然而諸賢之作鏘金而戛玉韶濩奏而鸞鳳鳴自足以悅神情忘百慮為引年之一助云大德乙己丑月五日書送馮仲潛序徽政屬總管府判官馮德昭仲潛故友懷善甫次息轉運君之孫前進士寧化尹提學君之曽孫也生有厚質沈毅莊恪寡言笑襲芳紹休敻異凡子矧受學其外祖昭文潛齋先生之門而壻于父執馬君肅政家磨礱浸灌文質炳蔚幹局敏達一時譽望藹然繇長秦漢民而轉是任嘗觀一私家之事而在公之六曹庶務咸備傳曰居家理故治可移於官信哉顯揚之道在其中矣方祇命成都來敘别且徴鄙言我聞曰事君如事親事官長如兄與同僚如友朋待吏卒如家衆處官事如家事愛百姓如親妻子母使毫髮不盡如是而已又本之以忠信行之以清勤餘力讀書資養原本仕優而學聖門遺軌也氷霜栗烈天地肅清修棧造雲往哉叱馭復有癡能了事云者實悠悠誤世之談愼勿聽之也樗巖諸君皆有戒休勸相之辭凡如干篇病叟蕭某敘之送孫秀才序定西之為州在隴右極邊習武尚氣土俗固爾而有能使其子弟為學而子弟又能篤志副所望者咸可謂難矣秀才孫生以父命不遠數百里請肄于鞏府之教授文君靜卿先生之門受六藝學居郡序者數年既而先生赴召王庭解惑靡所將東遊長安而學焉其二親以為方秋冬之交旅寓非易俟開歲議之而生進取之意甚鋭即與同舍毛生冒霖潦不告而東其父懼其不利於跋涉也騎而追之不能及抵長安乃見之以之歸不可遂偕展束修之儀于韓君從善先生之席執經而從事焉從善亦嘗稱其可與進也今年春兩生介僕日所與遊者云其囊資已竭城中不可留而亦不能歸也將寓諸郊而時質所疑焉僕據義以辭之屢矣而兩生日與諸友偕來不輟未幾毛生先歸而孫生之來益熟乃分余土室以居逮三月矣今將歸而徴言余維忠告之義而謂之曰聞之格物致知之方則有論古今人物而辨其是非者况近在吾身乎日夕思省使是非皎然是則加勉非則改之母自欺焉學之要也故子之鋭於進學可謂是矣若去秋之來東今歲之出郊則皆非也僕又枉已徇物持姑息以待子亦非也昔賢有云學者所以學為忠為孝又謂欲求事君而先欺君不可詎有方將為學而先傷父母之心者乎遊必有方以父母之心為心也烏可易其處哉且學者之求師猶行者之問途資其指導之一言爾至於道路物色難易曲折緩急則登途自見要在善行之而已聞令尊君儒者也固無使子陷於非義者但當一切聽順不可萌毫髮私意又以天下無不是底父母之語推而行之為學之道無加於此矣夫仁義之實不離事親從兄之間而千里遊學將舉廢之是離物求則豈聖門實學也哉隆暑畏途敬慎夙夜是亦學焉事無非學又朱夫子之至言也僕蕪廢日久感子嚮學之勤不覺自失然進鋭退速聖賢所戒子能勉以終之吾輩之望也安西諸君皆有詩咏故為序之送王辨序聖上嗣位之三年詔天下以德行明經取士明年陜西魯齋書院山長平水王辨受行中書省薦辭其職將進於春官省余疾南山下且徴鄙言詢之曰能無矜乎能無忮乎能忘富貴乎能靜乎能中正乎能希賢聖乎知通塞乎無患得乎若是可以言矣易曰大觀在上中正以觀天下此其時也子之業在夫爻之三矣曰所謂觀光者非邪曰非也四大臣之位近君者以之而子也第當觀夫繇已出者隨通塞為進退焉所期不失於道而已茍通邪即立事立功尊所聞行所知使民不失其所望茍塞邪則仁義忠信樂善不倦其孰能禦之知至而至知終而終茍不至乎踐形之域無止也故先正以少年登髙科為不幸豈虛言哉子行矣慎母使前數可無者毫末塵吾靈府也冰雪載塗敬慎自愛送陳耕道序天子以德行明經取士之歲夏暑雨炎酷陳生耕道來自咸寧諗豫曰畇之伯氏榮以服賈養母客死京師藁殯僧舍者八年老親以不得歸葬念念不能忘比以耀州文學掾得謝將詣乎都發兄之櫬以西幸辱教耕道開爽莊慎學有師法流輩所推重然病夫困蒸鬱昏昏夢寐中莫知所以為辭適連雨有秋意乃獲踐言曰人之所以為人以其有仁義仁義之大者親親爾尊賢爾子能輟循陔之愛趨陟岡之義期慰母心誠幹蠱之大者張仲之播美於聲詩也勉之京師首善之地國學又文正魯齋夫子遺躅良法美意宛在詎可大嚼屠門而已邪先正有言事無非學今往反數千里險阻艱難人情物態觀之深慮之熟處之有義行之有道方册之云信而有徴矣孰謂秦無人邪新涼嫋嫋雲峯猶竒中央土德四時之氣具焉宜慎調攝母久懸倚門之情知耕道者有瑶華之贈凡如干什送王克誠序昔顔黃門言别易會難古人所重江南餞送下泣言離而詩人有丈夫非無淚不灑别離間之云意顔説乃其常詩人故反之為髙竒耳繼以蝮蛇螫手壯士解腕為喻思功名以排遣離别之悲豈知崇一已之私欲減交友之真情陷於絶裾齧臂之倫知德者不貴也丞相府長史王克誠向僕在京師多仰引翼及歸送别南城眷眷之懷猶記也今年春奉朝命會理行尚書省金穀來陜西覲省之餘問余疾南山下相對恍如夢中訪舊驚呼半為異物今而言别作惡如何王事靡盬子來莫期餘生無幾後會難必信顔君所言人之情天之理不誣克誠溫恭有學以古人自期臨事不茍必潔度而為固本安上深長之思詩云樂只君子邦家之基君其有焉繇是公卿大夫咸韙之而上下罔或怨恫也卷中諸君子贈行之作可知已某勉序之粃粳良愧長途觱發重裘是宜志道雖勤復圭宜力何以處我焉得忘言耶張氏壽母辛八十之慶歌詩序天錫禹範以壽富康寧好德為福夫子傳履霜之繇曰積善之家必有餘慶皆所以為萬世生民建極之法語也德即福善即慶匪二道也報應之説蠱人心久矣二天人也天人二則私意為之主德善何有焉杜曲故鄉先生張翁潤夫之淑儷辛氏年登八秩而康寧聰瞭有遜志迪德二子十孫四女甥十三彌孫五可謂福慶矣夷考其行亦惟即夫人倫日用之常行也無歉而已蓋遜志曰母生二十年而結褵供養尊章十年襄內治鞠育幼稚六十年其端潔靜專孝敬慈裕如一日翁儒行力田以經訓淑里黨居樊川佳處髙人勝士時時留止其舍節衣食為厚具無少懈嘗曰吾家前朝號多田富有兵亂中盜苦吾父至于焚炙人生苐免寒飢足矣何必多財為患故耕織之外一無他務人之華好不一臨視寧瘠已而腴人勉勉進修令不墮儒素詔女教婦宜其家撫循僕使若天屬雖老不異糧得甘旨必均賚中歲苦上氣疾不能強藥劇則飲水旬日恆伏枕比年食飲步履復如初遜志之言如此且曰七月二日母之初度將遍求時賢大夫士歌詠以慰其艱劬傳之于家永以示子孫願先生之敘述也竊惟壽母生田間不繇姆訓克盡力職分所當為則天質之美可知矣况忌盈滿以無求為足不幾于達乎約已以饋賓與截髮近似而異若宿疴頓失子孫滿前德善之徴也哉夫子曰父父子子兄兄弟弟夫夫婦婦而家道正上言善下言慶也維君子樂道人之善得不為潛德而發幽光以慰孝子慈孫之望且以正人心俾知為善之實而不妄徼求於冥漠也詩凡若干篇延祐丁巳歲七月吉日序李臨名字序禾川人士李以正介彰縣彭彥寬謁豫贄以新文陳相見之儀逮暇過余曰臨之名與字先生所錫維易傳是稽願有序夫易之為書廣大悉備其要立三極之道而已請以為學言以吾之德性為陽之屬為剛血氣私欲為隂之屬為柔未知學者日唯聲色嗜欲為務自暴自棄者有之猶天地純隂之時也良心發焉猶陽生於羣隂之下在易為復為臨臨二陽之長有地澤之象取上下相臨為名凡心思事物所際皆是有元亨利貞八月有凶之象故觀象玩辭當使吾之陽明德性悅而日長隂濁物欲順而日消則大亨以正夫誰禦之知二隂之長陽遁有凶則保吾之貞固崇德修慝扶陽抑隂拳拳而弗失之夫聖門之學由日月至焉以及三月不違天道雖變自若也過此則化而無息矣或謂人事異乎天道邪曰固也八月之凶學之不篤則有物欲消德義之失君子則克治有素必使物欲退聽而察吾氣稟剛柔善惡之偏用力焉以剛善克柔惡為陽之長柔善克剛惡為隂之長故具果毅幹固慈順之美而無猛隘強梁懦弱邪佞之疾隨感而發皆善而中節其臨道之至矣乎雖然臨實剛長之時所云皆屬乎動唯持敬存養大本尤不可忽以正勉之又大象之傳曰君子以教思無窮容保民無疆蓋澤能潤乎地地可容夫澤也聞以正有胡公子叔願闢館之招此適今日賓主所當以之者李稅使妻馬氏哀詩序詩曰無非無儀惟酒食是議無父母貽罹婦人之常也又曰釐爾女士然則女之有士行者昔人所稱願如此烏可少之耶寶雞劉尹庭玉謂余言其妻之母馬君之賢也詢之則曰慈惠而明達孝於父母舅姑佐君子鳳翔稅使李君得事之宜財雄一郡而莫有怨忮陵犯之者而家益完以美晝哭時四子俱幼禮聘端士教之嚴其程業禮度卑其服食勤其四體今皆循循謙恭有成立昏姻咸大族而蠶績刀匕諸婦必躬家衆三千指愛敬如父母户庭閴然宗屬間孤兒女收而教育同已生成長又家室之者五六人若是者不賢而能之乎况已債子錢家貧每為折劵恤窮新養濟院給糧藥購地賑飢大德九年旱飢發粟麥以石計百有五十惠及一方者乎又况族里之骨肉勃磎者質焉而信服之者乎今年六十三而終其葬也西州大夫士作為相哀之辭凡如干篇願序之以範諸來裔余曰成周教民六行無之者有刑教成者賓興焉古之發政施仁必先煢獨鰥寡水旱則假貸勸分此皆政之善者而又賢士大夫之所為也世豈無富民哉方自足其口體耳目之欲以敗其子弟怒其鄉鄰者皆是也有能深思長慮成子問學為衣纓家且知積而能散之道如一嫠婦人者乎是真無愧乎女士矣抑余有感焉夫齊民以財力相長雖嫠婦有以及人若夫居崇髙之君子善其政教而發施之民有不被其惠澤者乎書之使藏其家俾來者有考也大德丙午季冬望日勤齋病叟蕭某書記醴泉縣廟學記醴泉縣廟學故在城內東北元祐中博士蘇季明記之金亡廢至元乙亥縣尹東平宋侯洙徙於南市大德壬寅從仕盧侯佐為縣祇謁初覩囂隘庫陊廟而無學大懼不稱聖朝崇尚樂育之意課諸監縣沙卜珠簿尉陳瑞南進義詢之縣史王濟得故廥墟當文明之位顯敞爽塏稱為神居盧侯以二歲已俸為倡同僚士庶遠暨咸陽槐里士夫之賢者皆捐金以助為禮殿居中繪羣賢大儒於兩廡齋廬講堂庖庾門垣悉備左轄耶律公希逸翰林劉公賡旬宣關右韙其知務翰林為書殿榜焉既終更敦武郝侯某繼至增正殿平基周陛嚴陛楯以衛賢像徙石刻庭下建烏頭大門仍諉醫學諭劉君珽植花果名木以千數甲辰三月吉日告成學諭王君贇狀其事請記辭久不獲惟古昔聖神繼天立極設為庠序教以人倫使之順性命之理變化氣質之偏人皆有士君子之行而比屋可封也四代之學至周而備而他術異道不得汨之故民志正風俗同賢材衆而厯世久兩漢而下鄉里之舉風俗雖降人猶知自修隋立進士科專尚文辭唐宋遼金因之致多士蒙干澤之辱載籍為射利之具民彛泯亂矣理極而復世祖聖德神功文武皇帝天縱聖哲别詔設官劭農立社擇師教以孝經小學大學論孟經史敦本抑末今聖上仰繩祖武知為治本乎風俗而風俗本乎士以德行明經設科以孝弟信義為本以四書五經程朱訓傳為學問躬行之要思濟斯民以先王之道將致成德全才覩真儒之事業詔下主縣簿大同盧侯仲誠來速記告曰吾黨之士何以仰答皇上譽髦斯士之美意乎曩以文墨取人其弊使之喪心無所歸宿今也不然士果充吾良知良能力行夫聖賢經訓日就月將義精仁熟居廣居立正位行大道用之能行舍之能藏尊主芘民美風俗壽國脈無入而不自得可謂君子儒為已之學矣茍不知自愛徒以綴文辭叨富貴為心即明德已有蔽虧得之則昏傲矜誇失之則躁蹙訕訐卒之斁王化傷士風豈所謂德行之舉經術之教也耶國家果何所望哉亦豈三侯經營成就之勤之願哉吾黨之士貴慎擇厥初學古書院記書院始于唐元和間衡州人李寬于石鼓山南唐升元於廬山白鹿洞宋大中祥符間睢陽民曹誠即戚同文舊居建學舍百五十間蓄書二千五百卷召明經藝者講習及嵩陽嶽麓茅山皆聚徒教授肄業朝廷畀之九經賜以敕額時天下有四書院之稱是後江南諸郡凡先正過化之地皆置書院敬延儒先昭明斯道以遵前軌北方金氏百年所無也皇元奄有九圍教尚儒術屢敕有司勉勵學校世祖淵龍書召魯齋許公疇咨啓沃之餘命教人于京兆成德者多為時用今悉物故陜西行臺立魯齋書院以紹前人淑後學邦人興起焉是時湍陽平水渭上亦有書院籍籍有成於是三原民李子敬聚弟子懋以民錢五萬緡築室儲書號曰學古既落之請鄉先生悅古程君主之眘獨白君繼之啓迪漸有成序部使者上之朝報下旌其門恭甫謂余曰願識書院之成事然非敢矜也將俾此方之人新其耳目滌其靈府有以大變其風俗庶乎後之人為詩書家志願畢矣幸有以教之也辭曰師儒之職安敢僣三請益勤乃勉以毋欲人知而為侈大母以歲久而生懈怠遂筆其實以記秦王妃祠堂記延祐戊午夏開成路總管王公澤以書告蕭㪺曰鄉也欽承儀天興聖慈仁昭懿壽元全德泰寧福慶皇太后玉音於秦王元妃祠堂月供牲牢醴齊以為常有司虔恭奉行五年於兹矣祠蓋寺人田長安所建事具府學士人郭好德狀願紀之石謹按妃諱伊囉斡姓吉嚕氏唐朱邪之後乃祖叶贊聖朝撫寧中夏以勳公分土食靜安諸城聯姻天家孫阿爾布哈尚世祖皇帝公主封髙唐郡王妃之考也今嗣封鄃王妃之弟也宸眷以妃配皇孫秦王王之國不幸蚤薨妃淑慎貞靜聰朗淵懿好古博雅嘗聞中陽薛氏董母闢館授徒驛召留歲餘通經訓大指恆深居邃殿維圖書是親又不幸薨於大德丙午秋陵谷之變長安者京兆畫工璋之子以隱宫為寺人感服慈惠之久即崩殿故址肖像立祠晨夕瞻奉故朝廷嘉其不忘主恩鄃王及百執事感其敦篤亦咸有助嗚呼民之秉彛好是懿德夫惓惓者誰實使之哉雖然兹亦沔陽祠諸葛公之屬姑以慰人之思而已若夫配位先王以饗嘗蒸有國之典禮在五月吉日前集賢學士通議大夫國子祭酒太子右諭德蕭某記稽中堂記友周君介夫刺武王誥康叔語扁厥居自警諉余記聞人之心虛靈知覺主一身涵動靜具衆理妙萬物惟聖哲氣稟粹精鑑空而衡平仁義禮智渾然無倚曰中德事物感之萬善攸出惻隱羞惡辭讓是非應各以物無過不及曰時中惟厥庶民昏駁攸質爰自有生中德既罔顯習尚物欲乘釁以汨旦晝宵寐斯須靡寧心繄聲色臭味勢利紛華是誅便儇巧佞卑汚茍賤是狃靈府惟冰炭攸積彛則曷其存維先哲戒玩物喪志期精義以誠身而凡民覆玩物喪志是求私欲荼毒救渴以鴆奚益嗚呼大化不息匪髙明日進必汙下日趨弗靈沒齒哀哉惟昔顔子躬博文約禮明睿攸燭乃克有擇拳拳依中德茍禮義之心未純時墮于過罔及覺知必一準夫顔曽自一事一物究極天則盡吾之靈昭徹表裏乃一意乎善罔自欺爰作稽中德庶幾弗畔矧稽之古惟考惟計必敷求古先聖哲若堯舜禹惟精一乃克執厥中亦越成湯惟禮義以制中乃建肆昔之壽耉成已成物罔匪承于古若大易之有卦六位別以計乾二五固中初潛三乾乾四或躍上戒于亢時亦罔非中必有定于前行道斯弗跲兹即一飲食話言其尚謹日用矜細行觸類以長天下罔不惟悉允惟于兹業廣德崇允惟王正事之臣天若元德夫誰禦敬之哉自貽哲命介夫孝友忠信篤志問學詩書四子舉成誦善夫書言克明有政其遠大未易量也大德丁未十月既望北海蕭㪺記有筠亭記竹之為貴何比德君子也若風人託興以美其上記禮者以其有筠能貫四時不易譬人之有禮能釋回增美焉皆其章章者也前安西路總管府治中池陽王侯器之有别墅在樊川韋曲東有息遊之亭在其寢東北隅茂竹間至元庚寅春即其圯而新之增庳益狹易茨以瓦既成屬豫名與識久不得辭維夫竹之於用衆矣上自宫省下逮邑井廬野吉凶賓軍日用巨細微竹罔與成其功者以是天府之入歲恆與鹽酒埒虞衡厲守之罹其禁者有罰故民以為患然或樹之庭砌而比德是取則無禁焉是知所可貴者不在彼而在此明甚乃綴禮家語筆其扁且告之曰騏驥一日千里所稱者非以其力蓋貴德不貴才之義通天下古今也故君子感焉夫德其本也才則其施德有小大才必從之不德而才古所謂不才子也酆舒盆成括之流亦何足算才如周公不可無德可不懼乎侯故儒家明熟吏治敏給有幹局兩佐大府籍籍有稱西州乃令以疾間居方益以遠猶偉哉乎侯誠有志於是必也從事夫博文約禮之訓多識前言往行視聽言動思一是以禮有聞斯尊有知斯行暨乎真積力久擴而充之宏綱正萬目張雖羽儀天朝矜式黨里與夫光昭祖考垂憲來裔者舉無遺恨乃稱夫儒家事業矣然則斯亭也不為無助名之與識亦豈徒云乎侯其懋之哉宜刻之金石庶後世子孫守之無斁也明年二十有八年清明日齊人蕭㪺記務滋亭記滋今之灞水本名也史稱秦穆公改焉隋開皇五年復為滋水而俗猶不改蓋漢魏已降名灞已久隋短世不能遽回民之觀聽也河中人韋君佐余及識其大父五翁精練勤儉善治生通輕重之理鬻鹽長安市而人皆視其賈為之準雖公府弗能軒輊也繇是起家為巨室而君佐之父國寶善守成法又買田灞上益以衣食之本為務蓋將老焉築亭為館賓之所雜植花竹果蔬于前後爽塏髙明仲夏可居求名僕遂書之取其為農於滋水之上也語曰一年樹之以穀十年樹之以木百年樹之以德書曰樹德務滋蓋寓其名以明樹德之本指也君城中所居有堂曰周德故以相發其義云秦穆公改之欲以彰霸功今而復之欲以滋吾德皆所以示子孫也各從其志也大德丁未某月某日勤齋病叟蕭某維斗識柳溪新洞記自鳴犢鎮走義谷道左有小溪舊以柳溝名其源有二一分義谷水自甫張而下一發源李義里北流會之其下即溪也因曰柳溪雷氏自濮府幕君育德纍行慶衍于後嗣知事君長子復字伯靜積學力行承孝以德儒先時輩推服焉次子介字仲介承兄克家既完既美次子恆字仲常益字叔謙觀字季正應奉翰林文字一門孝友為關右所稱初伯靜既葬其妣趙夫人于溪西平里别業曰此吾家世守也遂有營葺意緣溪種柳數十百株因髙為臺將遂構亭以為藏修之所不幸早世而仲介葬其考知事君廬墓制闋又鑿溪西垠以廣之為洞二曰稽古以讀書為志且取穴居之意也為堂四楹堂洞之右儲書其中曰進德以成稽古之意也堂前小方池植一白芙蕖名曰玉淵取顔延之詩語也池東小渠㶁㶁過其前橫梁度之其東北為大池則樗巖馬肅政命曰錦雲以植紅蓮名之也直堂東渠之左曰東池以堂逐溪形以池正之是不忘規正之義也三池若鼎足與稻塍錯處且雜藝花竹其間繚以杏籬總名之曰柳溪新洞余嘗阻雨信宿堂中蕭然終日向伯靜手植之柳皆濃緑參天禽聲和鳴殊有勝致猶恨不及晴霽不見雲山遠近之態也仲介舉酒囑余曰先兄一生志于學古且治命見託以弟與子之為學介何敢忘况松楸所在覬後日子孫必有學問以成先志者子盍為我記之余曰此君家翰林之事也曷敢僣又起而請書此語曰待他日足成之大德乙巳六月己丑勤齋某記
